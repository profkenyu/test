<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TRANSIT: 7 SYMPHONIES (FIXED LATE TIMELINE)</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation;}
:root{
  --bg:#050505;
  --cr:#8b0018;
  --crb:#c41e3a;
  --crg:#ff2a4a;
  --crd:#2a0008;
  --tx:#ddd5cc;
  --txd:#3a3030;
  --txm:#7a6565;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'DM Mono',monospace;}

/* ── SCREENS ── */
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;}
.screen.active{display:flex;}

/* ── TITLE ── */
#sc-title{gap:0;}
#title-canvas{position:absolute;inset:0;}
.title-wrap{position:relative;z-index:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:32px;}
.t-main{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(54px, 16vw, 120px);
  letter-spacing:.2em;line-height:.85;
  color:var(--tx);
  text-shadow:0 0 90px rgba(196,30,58,.3),0 0 180px rgba(139,0,24,.15);
}
.t-sub{font-size:10px;letter-spacing:.5em;color:var(--txm);text-transform:uppercase;margin-top:12px;}
.divider{width:40px;height:1px;background:var(--cr);margin:1.2em auto;}

/* ── BUTTONS ── */
.btn{padding:14px 44px;background:transparent;border:1px solid;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.3em;cursor:pointer;text-transform:uppercase;transition:all .25s;}
.btn-cr{border-color:var(--cr);color:var(--crb);}
.btn-cr:hover,.btn-cr:active{background:rgba(139,0,24,.1);border-color:var(--crg);box-shadow:0 0 28px rgba(255,42,74,.25);}
.btn-dim{border-color:var(--txd);color:var(--txm);}
.btn-dim:hover,.btn-dim:active{border-color:var(--txm);color:var(--tx);}
.btn:disabled{opacity:.25;cursor:default;pointer-events:none;}

/* ── TIME SELECT ── */
#sc-time{gap:40px;}
.sect-lbl{font-size:10px;letter-spacing:.4em;color:var(--txm);text-transform:uppercase;margin-bottom:10px;}
.time-row{display:flex;gap:18px;}
.time-btn{
  width:120px;height:120px;background:transparent;
  border:1px solid var(--crd);color:var(--txd);
  font-family:'Bebas Neue',sans-serif;font-size:46px;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;transition:all .25s;
}
.time-btn em{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;font-style:normal;color:var(--txd);}
.time-btn.sel,.time-btn:hover{border-color:var(--crg);color:var(--tx);background:rgba(139,0,24,.15);box-shadow:0 0 28px rgba(255,42,74,.2);}
.time-btn.sel em,.time-btn:hover em{color:var(--crg);}
.time-nav{display:flex;gap:12px;margin-top:10px;}

/* ── GAME ── */
#sc-game{flex-direction:column;}
#game-canvas{position:absolute;inset:0;}
.hud{
  position:relative;z-index:2;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:24px 32px 0;pointer-events:none;width:100%;
}
.h-stage-no{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.1em;color:var(--crg);line-height:1;}
.h-stage-nm{font-size:9px;letter-spacing:.2em;color:var(--txm);margin-top:5px;text-transform:uppercase;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.h-score{text-align:center;}
.h-score-v{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--tx);line-height:1;letter-spacing:0.05em;}
.h-score-l{font-size:8px;letter-spacing:.4em;color:var(--txd);}
.h-timer{text-align:right;}
.h-timer-v{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--tx);line-height:1;}
.h-timer-l{font-size:8px;letter-spacing:.4em;color:var(--txd);}

/* COMBO */
.combo-wrap{
  position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);
  z-index:2;text-align:center;pointer-events:none;
  opacity:0;transition:opacity .35s ease;
}
.combo-wrap.show{opacity:1;}
.combo-v{font-family:'Bebas Neue',sans-serif;font-size:72px;color:var(--crg);text-shadow:0 0 30px rgba(255,42,74,.6);line-height:1;display:inline-block;}
.combo-l{font-size:10px;letter-spacing:.5em;color:var(--crb);margin-top:4px;}
@keyframes combo-pop{
  0%{transform:scale(0.72);}
  55%{transform:scale(1.14);}
  80%{transform:scale(0.97);}
  100%{transform:scale(1.0);}
}
.combo-v.popping{animation:combo-pop .28s cubic-bezier(.34,1.56,.64,1) forwards;}

/* FEEDBACK */
@keyframes feedback-rise{
  0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}
  30%{opacity:1;transform:translateX(-50%) translateY(-8px) scale(1.04);}
  100%{opacity:0;transform:translateX(-50%) translateY(-32px) scale(0.9);}
}
#feedback{
  position:absolute;top:34%;left:50%;transform:translateX(-50%);
  z-index:4;pointer-events:none;
  font-family:'Bebas Neue',sans-serif;font-size:34px;
  letter-spacing:.2em;opacity:0;white-space:nowrap;
}
#feedback.rising{animation:feedback-rise .52s ease-out forwards;}

/* HIT ZONES */
.hit-zones{
  position:absolute;bottom:0;left:0;right:0;
  z-index:3;display:flex;height:130px;
}
.hz{
  flex:1;background:rgba(4,0,1,.93);
  border-top:1px solid rgba(139,0,24,.25);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;overflow:hidden;
}
.hz+.hz{border-left:1px solid rgba(46,0,10,.6);}
.hz::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 115%,rgba(139,0,24,.15) 0%,transparent 70%);
  animation:hz-breathe 2.5s ease-in-out infinite;
}
.hz:nth-child(2)::before{animation-delay:0.8s;}
.hz:nth-child(3)::before{animation-delay:1.6s;}
@keyframes hz-breathe{0%,100%{opacity:.45}50%{opacity:1}}
.hz-inner{
  width:12px;height:12px;border-radius:50%;
  border:2px solid var(--crd);
  position:relative;z-index:1;
  transition:all .06s;
}
.hz.tap .hz-inner{background:var(--crg);border-color:var(--crg);box-shadow:0 0 20px var(--crg),0 0 40px rgba(255,42,74,.5);transform:scale(1.5);}
.hz.tap::before{background:radial-gradient(ellipse at 50% 115%,rgba(255,42,74,.4) 0%,transparent 70%);animation:none;}

/* ── RESULT ── */
#sc-result{gap:0;}
.r-stg{font-size:10px;letter-spacing:.5em;color:var(--txm);text-transform:uppercase;margin-bottom:14px;}
.r-ttl{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,10vw,80px);letter-spacing:.1em;color:var(--tx);}
.r-score{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(84px,18vw,140px);
  letter-spacing:.02em;color:var(--crg);
  text-shadow:0 0 50px rgba(255,42,74,.35);line-height:1;margin:12px 0;
}
.stat-row{display:flex;gap:24px;margin:24px 0 44px;}
.stat-item{text-align:center;min-width:65px;}
.stat-v{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--tx);line-height:1;}
.stat-l{font-size:8px;letter-spacing:.25em;color:var(--txd);text-transform:uppercase;margin-top:6px;}
.r-btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}

/* ── CLEAR ── */
#sc-clear{overflow:hidden;}
#clear-canvas{position:absolute;inset:0;}
.clr-wrap{position:relative;z-index:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;}
.clr-lbl{font-size:10px;letter-spacing:.6em;color:var(--crg);text-transform:uppercase;}
.clr-ttl{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(80px,22vw,180px);
  letter-spacing:.15em;color:var(--tx);line-height:.82;
  text-shadow:0 0 70px rgba(255,42,74,.4),0 0 140px rgba(196,30,58,.2);
}
.clr-sc{font-size:13px;letter-spacing:.25em;color:var(--tx);margin-top:10px;}
.clr-btns{margin-top:36px;display:flex;gap:14px;}

/* ── STAGE INTRO OVERLAY ── */
#stage-intro{
  position:absolute;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(5,5,5,.95);
  opacity:0;pointer-events:none;transition:opacity .4s;
}
#stage-intro.show{opacity:1;pointer-events:all;}
.si-num{font-family:'Bebas Neue',sans-serif;font-size:clamp(64px,15vw,120px);letter-spacing:.15em;color:var(--crg);text-shadow:0 0 50px rgba(255,42,74,.4);line-height:1;}
.si-name{font-size:11px;letter-spacing:.3em;color:var(--tx);text-transform:uppercase;margin-top:12px;text-align:center;padding:0 20px;line-height:1.4;}
.si-bar{width:140px;height:1px;background:var(--cr);margin:18px auto;}
.si-bpm{font-size:10px;letter-spacing:.3em;color:var(--txm);}
</style>
</head>

</div>

<div id="sc-result" class="screen">

  <div class="stat-row">

<div id="sc-clear" class="screen">

      <button class="btn btn-dim" onclick="clickNav('sc-title')">HOME</button>
      <button class="btn btn-cr" onclick="clickPlayAgain()">PLAY AGAIN</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════
//  AUDIO ENGINE — Dynamic Orchestra & Master Gate
// ═══════════════════════════════════════════════
let _ac = null;
let mainConcertDelay = null; 
let masterVolumeGate = null; 

function ac() {
  if (!_ac) { 
    _ac = new (window.AudioContext || window.webkitAudioContext)(); 
    masterVolumeGate = _ac.createGain();
    masterVolumeGate.gain.setValueAtTime(1, _ac.currentTime);
    
    mainConcertDelay = _ac.createDelay();
    mainConcertDelay.delayTime.value = 0.22;
    const reverbFeedback = _ac.createGain();
    reverbFeedback.gain.value = 0.28;
    
    mainConcertDelay.connect(reverbFeedback);
    reverbFeedback.connect(mainConcertDelay);
    
    masterVolumeGate.connect(_ac.destination);
    mainConcertDelay.connect(masterVolumeGate);
  }
  if (_ac.state === 'suspended') _ac.resume();
  return _ac;
}

function fadeOutAudioEngine() {
  if (!masterVolumeGate) return;
  try {
    const ctx = ac(), t = ctx.currentTime;
    masterVolumeGate.gain.setValueAtTime(masterVolumeGate.gain.value, t);
    masterVolumeGate.gain.linearRampToValueAtTime(0.001, t + 1.2);
  } catch(e){}
}

function resetAudioEngineVolume() {
  if (!masterVolumeGate) return;
  try { masterVolumeGate.gain.setValueAtTime(1, ac().currentTime); } catch(e){}
}

function sMenuClick() {
  try {
    const ctx = ac(), t = ctx.currentTime;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(750, t);
    o.frequency.exponentialRampToValueAtTime(250, t + 0.04);
    g.gain.setValueAtTime(0.08, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    o.connect(g); g.connect(ctx.destination);
    o.start(t); o.stop(t + 0.06);
  } catch(e){}
}

function playOrchestraNode(freq, instrType, baseVolume, duration = 0.4, isAccent = false) {
  try {
    const ctx = ac(), t = ctx.currentTime;
    const osc1 = ctx.createOscillator(), osc2 = ctx.createOscillator();
    const gainNode = ctx.createGain();
    const filterNode = ctx.createBiquadFilter();
    
    filterNode.type = 'lowpass';
    const volMult = isAccent ? 1.35 : 0.85;

    if (instrType === 'piano') {
      osc1.type = 'sine'; osc1.frequency.setValueAtTime(freq, t);
      osc2.type = 'triangle'; osc2.frequency.setValueAtTime(freq * 2, t);
      filterNode.Q.setValueAtTime(2, t);
      filterNode.frequency.setValueAtTime(freq * 3.5, t);
      filterNode.frequency.exponentialRampToValueAtTime(freq * 1.1, t + 0.2);

      gainNode.gain.setValueAtTime(0, t);
      gainNode.gain.linearRampToValueAtTime(baseVolume * volMult, t + 0.005);
      gainNode.gain.exponentialRampToValueAtTime(baseVolume * 0.25, t + duration * 0.4);
      gainNode.gain.exponentialRampToValueAtTime(0.001, t + duration * 1.1);
    } 
    else if (instrType === 'string') {
      osc1.type = 'sawtooth'; osc1.frequency.setValueAtTime(freq - 0.4, t);
      osc2.type = 'triangle'; osc2.frequency.setValueAtTime(freq * 2 + 0.8, t);
      filterNode.frequency.setValueAtTime(freq * 2.2, t);
      filterNode.frequency.linearRampToValueAtTime(freq * 1.3, t + duration);

      gainNode.gain.setValueAtTime(0, t);
      gainNode.gain.linearRampToValueAtTime(baseVolume * volMult, t + 0.05);
      gainNode.gain.exponentialRampToValueAtTime(baseVolume * 0.35, t + duration * 0.6);
      gainNode.gain.exponentialRampToValueAtTime(0.001, t + duration * 1.3);
    } 
    else { 
      osc1.type = 'sawtooth'; osc1.frequency.setValueAtTime(freq, t);
      osc2.type = 'sawtooth'; osc2.frequency.setValueAtTime(freq * 1.003, t);
      filterNode.frequency.setValueAtTime(freq * 2.8, t);
      filterNode.frequency.exponentialRampToValueAtTime(freq * 1.6, t + duration * 0.5);

      gainNode.gain.setValueAtTime(0, t);
      gainNode.gain.linearRampToValueAtTime(baseVolume * volMult, t + 0.02);
      gainNode.gain.exponentialRampToValueAtTime(0.001, t + duration);
    }

    osc1.connect(filterNode); osc2.connect(filterNode);
    filterNode.connect(gainNode);
    gainNode.connect(masterVolumeGate);
    gainNode.connect(mainConcertDelay); 
    
    osc1.start(t); osc2.start(t);
    osc1.stop(t + duration * 1.4); osc2.stop(t + duration * 1.4);
  } catch(e){}
}

// ═══════════════════════════════════════════════
//  7 STAGES DATA (후반부 템포 지연 및 늘어짐 전면 수정)
// ═══════════════════════════════════════════════
const FALL_DUR  = 2.20;  
const W_PERF    = .14;   
const W_GOOD    = .28;   
const HZ_H      = 130;   

const STAGES = [
  {
    bpm: 72, name: "Air on the G String (Bach)", instr: 'string', gain: 0.16,
    baseChords: [
      [146.83, 220.00, 293.66], [138.59, 220.00, 277.18], [110.00, 164.81, 220.00], [98.00, 146.83, 246.94],
      [87.31, 130.81, 261.63], [73.42, 110.00, 220.00], [82.41, 123.47, 246.94], [110.00, 164.81, 220.00]
    ],
    // [수정]: 45초 이후 타임라인의 밀도를 타이트하게 좁혀 속도감 배가
    fullTimeline: [
      [0.0, 0, 293.66], [1.0, 1, 293.66], [2.0, 2, 261.63], [3.0, 1, 261.63],
      [4.0, 0, 246.94], [5.0, 1, 246.94], [6.0, 2, 220.00], [7.0, 1, 220.00],
      [8.0, 0, 196.00], [9.0, 1, 246.94], [10.0, 2, 293.66], [11.5, 1, 392.00],
      [12.0, 0, 369.99], [13.0, 1, 293.66], [14.0, 2, 220.00], [15.0, 1, 146.83],
      [16.0, 0, 293.66], [17.5, 1, 329.63], [18.0, 2, 349.23], [20.0, 1, 392.00],
      [22.0, 0, 440.00], [23.0, 1, 493.88], [24.0, 2, 523.25], [26.0, 1, 587.33],
      [28.0, 0, 659.25], [29.5, 2, 587.33], [31.0, 1, 523.25], [33.0, 0, 493.88],
      [35.0, 1, 440.00], [37.0, 2, 392.00], [39.0, 0, 349.23], [42.0, 1, 293.66],
      // ── 후반부 속도 저하 해결 (컴팩트 간격 배치) ──
      [45.0, 0, 293.66], [46.5, 1, 392.00], [48.0, 2, 440.00], [49.5, 1, 493.88],
      [51.0, 0, 523.25], [52.5, 1, 587.33], [54.0, 2, 659.25], [55.5, 0, 698.46],
      [57.0, 1, 783.99], [58.5, 2, 880.00], [60.0, 0, 698.46], [61.5, 1, 587.33],
      [63.0, 2, 523.25], [64.5, 1, 493.88], [66.0, 0, 440.00], [67.5, 1, 392.00],
      [69.0, 2, 440.00], [70.5, 0, 493.88], [72.0, 1, 523.25], [73.5, 2, 587.33],
      [75.0, 0, 659.25], [76.5, 1, 698.46], [78.0, 2, 783.99], [79.5, 1, 880.00],
      [81.0, 0, 932.33], [82.5, 2, 880.00], [84.0, 1, 783.99], [85.5, 0, 698.46],
      [87.0, 1, 587.33], [88.5, 2, 493.88]
    ]
  },
  {
    bpm: 85, name: "Für Elise (Beethoven)", instr: 'piano', gain: 0.14,
    baseChords: [
      [110.00, 164.81, 329.63], [116.54, 174.61, 293.66], [110.00, 164.81, 329.63], [130.81, 196.00, 329.63],
      [146.83, 220.00, 349.23], [110.00, 164.81, 220.00], [116.54, 174.61, 293.66], [110.00, 164.81, 329.63]
    ],
    fullTimeline: [

let padIntervalId = null;
let currentChordIdx = 0;

function startBackgroundOrchestration(si) {
  stopBackgroundOrchestration();
  const cfg = STAGES[si];
  const beatDuration = 60 / cfg.bpm; 
  const measureTime = beatDuration * 4 * 1000; 
  currentChordIdx = 0;
  
  const playChordProgressive = () => {
    if (!G.running) return;
    const chord = cfg.baseChords[currentChordIdx % cfg.baseChords.length];
    chord.forEach((freq) => {
      playOrchestraNode(freq, 'string', cfg.gain * 0.45, measureTime / 1000, false);
    });
    currentChordIdx++;
  };

  playChordProgressive();
  padIntervalId = setInterval(playChordProgressive, measureTime);
}

function stopBackgroundOrchestration() {
  if (padIntervalId) { clearInterval(padIntervalId); padIntervalId = null; }
}

function genNotes(si, dur) {
  const { fullTimeline } = STAGES[si];
  const notes = [];
  
  fullTimeline.forEach(([timeOffset, lane, freq]) => {
    const ht = FALL_DUR + timeOffset;
    if (ht < dur - 0.2) {
      notes.push({ lane, freq, ht, hit:false, miss:false, playedSound:false });
    }
  });
  
  return notes.sort((a,b) => a.ht - b.ht);
}

//  GAME STATE
// ═══════════════════════════════════════════════
const G = {
  stage:0, selTime:45, score:0, totalScore:0,
  combo:0, maxCombo:0, perfects:0, goods:0, misses:0,
  notes:[], particles:[], ripples:[], ambientPts:[], laneFx:[0,0,0],
  running:false, gt:0, startT:null, lastT:null, raf:null,
  isFadingOut:false, missFlash:0
};

let cv, cx, W, H;
function setupCanvas() {
  cv = document.getElementById('game-canvas'); if(!cv) return;
  cx = cv.getContext('2d');
  W = cv.width  = window.innerWidth; H = cv.height = window.innerHeight;
}

window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  if (cv) { cv.width = W; cv.height = H; }
  const tcv = document.getElementById('title-canvas'); if (tcv) { tcv.width = W; tcv.height = H; }
  const ccv = document.getElementById('clear-canvas'); if (ccv) { ccv.width = W; ccv.height = H; }
});

function laneX(l) {
  const mx = W * .1, sw = W - mx * 2;
  return mx + (l + .5) * sw / 3;
}
function laneW() { return (W * .8) / 3; }

function spawnParticles(lane, qual) {
  const x = laneX(lane), y = H - HZ_H * .5;
  const isPerfect = qual === 'PERFECT';
  const cnt = isPerfect ? 24 : 13;
  const col = isPerfect ? '#ff2a4a' : '#8b0018';
  const colRgb = isPerfect ? '255,42,74' : '139,0,24';

  for (let i = 0; i < cnt; i++) {
    const a = Math.PI * 2 * i / cnt + (Math.random() - .5) * .9;
    const sp = 55 + Math.random() * 145;
    const isEmber = Math.random() < 0.28;
    G.particles.push({
      x, y,
      vx: Math.cos(a) * sp * (0.7 + Math.random() * 0.6),
      vy: Math.sin(a) * sp - 45 - Math.random() * 30,
      r: isEmber ? (2.5 + Math.random() * 3.5) : (0.8 + Math.random() * 2.2),
      life: 1,
      dec: isEmber ? 0.014 + Math.random() * 0.01 : 0.022 + Math.random() * 0.022,
      col, colRgb, isEmber
    });
  }

  // Expanding ripple ring(s)
  G.ripples.push({ x, y, r: 6, life: 1, colRgb, speed: isPerfect ? 155 : 95 });
  if (isPerfect) {
    G.ripples.push({ x, y, r: 2, life: 0.65, colRgb: '255,210,190', speed: 88 });
  }
}

// ═══════════════════════════════════════════════
//  CORE RENDER & ENGINE LOOP
// ═══════════════════════════════════════════════
function initAmbientPts() {
  G.ambientPts = Array.from({length:20}, () => ({
    x: Math.random() * W, y: Math.random() * H,
    vx: (Math.random() - .5) * 7,
    vy: -3 - Math.random() * 7,
    r: 0.4 + Math.random() * 1.1,
    op: 0.03 + Math.random() * 0.07,
    phase: Math.random() * Math.PI * 2,
    drift: (Math.random() - .5) * 0.4
  }));
}

function draw(dt) {
  cx.clearRect(0, 0, W, H);
  cx.fillStyle = '#050505'; cx.fillRect(0, 0, W, H);

  // Beat-synced center throb
  const beatDur = 60 / STAGES[G.stage].bpm;
  const beatPhase = (G.gt % beatDur) / beatDur;
  const throb = Math.sin(beatPhase * Math.PI) * 0.04;
  const vg = cx.createRadialGradient(W*.5, H*.5, 0, W*.5, H*.5, W*.85);
  vg.addColorStop(0, `rgba(139,0,24,${0.05 + throb})`);
  vg.addColorStop(1, 'transparent');
  cx.fillStyle = vg; cx.fillRect(0, 0, W, H);

  const playH = H - HZ_H;

  // Ambient floating embers
  G.ambientPts.forEach(p => {
    p.x += (p.vx + Math.sin(G.gt * 0.4 + p.phase) * p.drift) * dt;
    p.y += p.vy * dt;
    p.phase += dt * 0.6;
    if (p.y < -6) { p.y = H + 4; p.x = Math.random() * W; }
    if (p.x < -4) p.x = W + 4; if (p.x > W + 4) p.x = -4;
    const a = p.op * (0.5 + 0.5 * Math.sin(p.phase));
    cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    cx.fillStyle = `rgba(196,30,58,${a})`; cx.fill();
  });

  // Lane guide lines
  for (let l = 0; l < 3; l++) {
    const x = laneX(l);
    const g = cx.createLinearGradient(0, 0, 0, playH);
    g.addColorStop(0, 'rgba(42,0,8,0)');
    g.addColorStop(1, 'rgba(196,30,58,.32)');
    cx.strokeStyle = g; cx.lineWidth = 1.5;
    cx.setLineDash([4, 8]); cx.beginPath(); cx.moveTo(x, 0); cx.lineTo(x, playH); cx.stroke();
    cx.setLineDash([]);
  }

  const now = G.gt;
  const cfg = STAGES[G.stage];

  // Notes
  G.notes.forEach(n => {
    if (n.hit || n.miss) return;
    const tuh = n.ht - now;

    if (tuh <= 0 && !n.playedSound) {
      if (!G.isFadingOut) playOrchestraNode(n.freq, cfg.instr, cfg.gain, 0.42, false);
      n.playedSound = true;
    }

    if (tuh > FALL_DUR + .15) return;
    if (tuh < -(W_GOOD + .02)) {
      n.miss = true; G.misses++; G.combo = 0; updateCombo(); showFeedback('MISS'); return;
    }

    const prog = Math.max(0, Math.min(1, 1 - tuh / FALL_DUR));
    const y = prog * playH; const x = laneX(n.lane);
    const near = tuh < .28 && tuh > -W_GOOD;
    const nw = laneW() * .75;

    // Fade in at birth (first 10% of fall)
    const fadeIn = Math.min(1, prog / 0.10);
    // Pulse glow near hit zone
    const pulse = near ? (0.5 + 0.5 * Math.sin(G.gt * 13)) : 0;

    cx.save();
    cx.globalAlpha = fadeIn;
    cx.strokeStyle = near
      ? `rgba(255,${90 + Math.floor(pulse * 80)},100,1)`
      : '#c41e3a';
    cx.lineWidth = near ? (3.5 + pulse * 1.8) : 2.5;
    cx.shadowColor = near ? '#ff2a4a' : '#8b0018';
    cx.shadowBlur = near ? (12 + pulse * 10) : 4;
    cx.lineCap = 'round';
    cx.beginPath(); cx.moveTo(x - nw/2, y); cx.lineTo(x + nw/2, y); cx.stroke();
    cx.restore();
  });

  // Particles
  cx.save();
  const dead = [];
  G.particles.forEach((p, i) => {
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 190 * dt; p.life -= p.dec;
    if (p.life <= 0) { dead.push(i); return; }
    cx.globalAlpha = p.isEmber ? p.life * 0.55 : p.life;
    cx.beginPath(); cx.arc(p.x, p.y, Math.max(0, p.r * (p.isEmber ? 1 : p.life)), 0, Math.PI * 2);
    cx.fillStyle = p.col; cx.fill();
  });
  for (let i = dead.length - 1; i >= 0; i--) G.particles.splice(dead[i], 1);
  cx.restore();

  // Ripple rings
  cx.save();
  G.ripples = G.ripples.filter(r => r.life > 0);
  G.ripples.forEach(r => {
    r.r += r.speed * dt;
    r.life -= 2.2 * dt;
    if (r.life <= 0) return;
    cx.beginPath(); cx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    cx.strokeStyle = `rgba(${r.colRgb},${(r.life * 0.55).toFixed(3)})`;
    cx.lineWidth = 1.5;
    cx.stroke();
  });
  cx.restore();

  // Lane hit FX
  for (let l = 0; l < 3; l++) {
    const x = laneX(l); const fx = G.laneFx[l];
    const alpha = fx > 0 ? fx * .5 : .06;
    const col = fx > 0 ? '255,42,74' : '139,0,24';
    const g = cx.createRadialGradient(x, H, 0, x, H, 90);
    g.addColorStop(0, `rgba(${col},${alpha})`); g.addColorStop(1, 'transparent');
    cx.fillStyle = g; cx.fillRect(x - 100, H - HZ_H, 200, HZ_H);
    if (G.laneFx[l] > 0.005) G.laneFx[l] *= 0.87; else G.laneFx[l] = 0;
  }

  // Miss edge vignette flash
  if (G.missFlash > 0) {
    G.missFlash -= 2.8 * dt;
    if (G.missFlash > 0) {
      const mf = cx.createRadialGradient(W*.5, H*.5, W*.18, W*.5, H*.5, W*.78);
      mf.addColorStop(0, 'transparent');
      mf.addColorStop(1, `rgba(70,0,8,${(G.missFlash * 0.6).toFixed(3)})`);
      cx.fillStyle = mf; cx.fillRect(0, 0, W, H);
    } else { G.missFlash = 0; }
  }
}

function gameLoop(ts) {
  if (!G.running) return;
  const dt = Math.min((ts - G.lastT) / 1000, .1);
  G.lastT = ts; G.gt = (ts - G.startT) / 1000;

  const rem = Math.max(0, G.selTime - G.gt);
  document.getElementById('h-tm').textContent = Math.ceil(rem);
  document.getElementById('h-sc').textContent = G.score;

  draw(dt);

  if (rem <= 1.0 && !G.isFadingOut) {
    G.isFadingOut = true;
    fadeOutAudioEngine(); 
  }

  if (G.gt >= G.selTime) { 
    G.running = false; 
    setTimeout(endStage, 300); 
    return; 
  }
  G.raf = requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════════
function hitLane(lane) {
  if (!G.running || G.isFadingOut) return;
  ac();
  const hz = document.getElementById(`hz-${lane}`);
  if(hz) {
    hz.classList.add('tap'); clearTimeout(hz._t);
    hz._t = setTimeout(() => hz.classList.remove('tap'), 100);
  }
  G.laneFx[lane] = 1;

  const now = G.gt;
  let best = null, bestD = Infinity;
  G.notes.forEach(n => {
    if (n.hit || n.miss || n.lane !== lane) return;
    const d = Math.abs(n.ht - now);
    if (d < bestD && d < W_GOOD * 1.5) { bestD = d; best = n; }
  });

  const cfg = STAGES[G.stage];

  if (!best || bestD > W_GOOD) {
    playOrchestraNode(164.81 * (lane + 1), cfg.instr, cfg.gain * 0.25, 0.18, false);
    return;
  }

  best.hit = true;
  playOrchestraNode(best.freq, cfg.instr, cfg.gain, 0.45, true);
  best.playedSound = true;

  const qual = bestD <= W_PERF ? 'PERFECT' : 'GOOD';
  const pts = (qual === 'PERFECT' ? 100 : 60) + G.combo * 2;
  G.score += pts; G.combo++;
  if (G.combo > G.maxCombo) G.maxCombo = G.combo;
  if (qual === 'PERFECT') G.perfects++; else G.goods++;

  updateCombo(); showFeedback(qual); spawnParticles(lane, qual);
}

function updateCombo() {
  const w = document.getElementById('combo-wrap'); if(!w) return;
  if (G.combo >= 2) {
    const vEl = document.getElementById('combo-val');
    vEl.textContent = G.combo;
    vEl.classList.remove('popping');
    void vEl.offsetWidth;
    vEl.classList.add('popping');
    w.classList.add('show');
  } else { w.classList.remove('show'); }
}

function showFeedback(qual) {
  const el = document.getElementById('feedback'); if(!el) return;
  const cols = { PERFECT:'#f0e8e0', GOOD:'#c41e3a', MISS:'#3e3535' };
  el.textContent = qual; el.style.color = cols[qual];
  el.classList.remove('rising');
  void el.offsetWidth;
  el.classList.add('rising');
  if (qual === 'MISS') G.missFlash = 0.22;
}

function showScreen(id) {
  if (G.raf) cancelAnimationFrame(G.raf);
  if (TRAf) cancelAnimationFrame(TRAf);
  if (CRAf) cancelAnimationFrame(CRAf);
  stopBackgroundOrchestration();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}

function clickNav(id) {
  ac(); sMenuClick(); showScreen(id); if (id === 'sc-title') initTitleAnim();
}

function selTime(sec, btn) {
  ac(); sMenuClick(); G.selTime = sec;
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel'); document.getElementById('start-btn').disabled = false;
}

function clickStart() {
  ac(); sMenuClick(); G.stage = 0; G.totalScore = 0; startStage();
}
function clickRetry() { ac(); sMenuClick(); startStage(); }
function clickNext() {
  ac(); sMenuClick();
  if (G.stage >= STAGES.length - 1) showClear();
  else { G.stage++; startStage(); }
}
function clickPlayAgain() { ac(); sMenuClick(); showScreen('sc-time'); }

function startStage() {
  const si = G.stage; const cfg = STAGES[si];
  if (!cfg) { showClear(); return; }

  resetAudioEngineVolume();

  Object.assign(G, { score:0, combo:0, maxCombo:0, perfects:0, goods:0, misses:0, particles:[], ripples:[], laneFx:[0,0,0], running:false, gt:0, isFadingOut:false, missFlash:0 });
  G.notes = genNotes(si, G.selTime);

  document.getElementById('h-stg').textContent = `STG ${String(si+1).padStart(2,'0')}`;
  document.getElementById('h-nm').textContent = cfg.name;
  document.getElementById('h-sc').textContent = '0';
  document.getElementById('h-tm').textContent = G.selTime;
  document.getElementById('combo-wrap').classList.remove('show');

  document.getElementById('si-num').textContent = `STAGE ${String(si+1).padStart(2,'0')}`;
  document.getElementById('si-name').textContent = cfg.name;
  document.getElementById('si-bpm').textContent = `${cfg.bpm} BPM`;

  setupCanvas(); initAmbientPts(); showScreen('sc-game');
  const intro = document.getElementById('stage-intro'); intro.classList.add('show');

  setTimeout(() => {
    intro.classList.remove('show');
    G.running = true; G.startT = G.lastT = performance.now();
    startBackgroundOrchestration(si); 
    G.raf = requestAnimationFrame(gameLoop);
  }, 2000);
}

function endStage() {
  G.running = false; stopBackgroundOrchestration(); G.totalScore += G.score;
  document.getElementById('r-stg').textContent = `STAGE ${G.stage + 1} COMPLETE`;
  document.getElementById('r-sc').textContent = G.score;
  document.getElementById('r-perf').textContent = G.perfects;
  document.getElementById('r-good').textContent = G.goods;
  document.getElementById('r-miss').textContent = G.misses;
  document.getElementById('r-cmb').textContent = G.maxCombo;
  document.getElementById('next-btn').textContent = G.stage >= STAGES.length - 1 ? 'FINAL RESULTS' : 'NEXT STAGE';
  showScreen('sc-result');
}

function showClear() {
  document.getElementById('clr-sc').textContent = `FINAL SCORE: ${G.totalScore.toLocaleString()}`;
  showScreen('sc-clear'); initClearAnim();
}

function setupInput() {
  document.querySelectorAll('.hz').forEach(hz => {
    const lane = parseInt(hz.dataset.lane);
    hz.addEventListener('touchstart', e => { e.preventDefault(); hitLane(lane); }, {passive:false});
    hz.addEventListener('mousedown', () => hitLane(lane));
  });
  document.addEventListener('keydown', e => {
    if (e.repeat) return;
    const m = { 'a':0,'A':0,'s':1,'S':1,'d':2,'D':2,'j':0,'k':1,'l':2,'ArrowLeft':0,'ArrowDown':1,'ArrowRight':2 };
    if (m[e.key] !== undefined) hitLane(m[e.key]);
  });
}

// ═══════════════════════════════════════════════
//  VISUAL EFFECTS
// ═══════════════════════════════════════════════
let TCV, TCX, TRAf, TPts=[];
function initTitleAnim() {
  TCV = document.getElementById('title-canvas'); if(!TCV) return;
  TCX = TCV.getContext('2d'); TCV.width = window.innerWidth; TCV.height = window.innerHeight;
  TPts = Array.from({length:38}, () => ({
    x: Math.random()*TCV.width, y: Math.random()*TCV.height,
    vx: (Math.random()-.5)*.3, vy: -.08 - Math.random()*.25,
    r: 0.6+Math.random()*1.8, op: 0.1+Math.random()*.7,
    phase: Math.random()*Math.PI*2, drift: (Math.random()-.5)*0.3
  }));
  titleLoop();
}
function titleLoop() {
  if (!document.getElementById('sc-title').classList.contains('active')) return;
  TCX.clearRect(0,0,TCV.width,TCV.height);
  const t = performance.now() / 1000;
  TPts.forEach(p => {
    p.x += (p.vx + Math.sin(t*0.3 + p.phase) * p.drift) * 0.5;
    p.y += p.vy;
    if(p.y < -5) { p.y = TCV.height+5; p.x = Math.random()*TCV.width; }
    if(p.x < -5) p.x = TCV.width+5; if(p.x > TCV.width+5) p.x = -5;
    const breath = 0.5 + 0.5 * Math.sin(t * 0.8 + p.phase);
    TCX.beginPath(); TCX.arc(p.x, p.y, p.r, 0, Math.PI*2);
    TCX.fillStyle = `rgba(196,30,58,${p.op * breath * 0.45})`; TCX.fill();
  });
  TRAf = requestAnimationFrame(titleLoop);
}

let CCV, CCX, CRAf, CPts=[];
function initClearAnim() {
  CCV = document.getElementById('clear-canvas'); if(!CCV) return;
  CCX = CCV.getContext('2d'); CCV.width = window.innerWidth; CCV.height = window.innerHeight;
  CPts = Array.from({length:40}, () => ({
    x: Math.random()*CCV.width, y: CCV.height+Math.random()*20,
    vx: (Math.random()-.5)*.4, vy: -.3 - Math.random()*0.5, r: 1+Math.random()*2, op: .4+Math.random()*.5
  }));
  clearLoop();
}
function clearLoop() {
  if (!document.getElementById('sc-clear').classList.contains('active')) return;
  CCX.fillStyle = 'rgba(5,5,5,.05)'; CCX.fillRect(0,0,CCV.width,CCV.height);
  CPts.forEach(p => {
    p.x += p.vx; p.y += p.vy; if(p.y < -5) { p.y = CCV.height+5; p.x = Math.random()*CCV.width; }
    CCX.beginPath(); CCX.arc(p.x, p.y, p.r, 0, Math.PI*2);
    CCX.fillStyle = `rgba(255,42,74,${p.op*.5})`; CCX.fill();
  });
  CRAf = requestAnimationFrame(clearLoop);
}

window.addEventListener('load', () => { initTitleAnim(); setupInput(); });
</script>
