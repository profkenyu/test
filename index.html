<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로렌츠 일식 (Lorenz Eclipse) - Generative Art</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020205;
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }
        #info-overlay {
            position: absolute;
            bottom: 30px;
            left: 30px;
            pointer-events: none;
            z-index: 10;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        h1 {
            margin: 0 0 5px 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ffaa00, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            margin: 0;
            font-size: 0.85rem;
            opacity: 0.6;
        }
        /* 로딩 텍스트 */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1rem;
            letter-spacing: 4px;
            opacity: 0.8;
            transition: opacity 1s;
            pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="loading">우주의 차원의 문을 여는 중...</div>
    <div id="canvas-container"></div>
    
    <div id="info-overlay">
        <h1>Lorenz Eclipse</h1>
        <p>Mathematical Chaos Meets Solar Rebirth</p>
    </div>

    <script>
        // --- 1. 기본 씬 설정 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020205, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 80);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.6;

        // 화면 로딩 제거
        setTimeout(() => {
            const loading = document.getElementById('loading');
            loading.style.opacity = 0;
        }, 1000);

        // --- 2. 로렌츠 어트랙터 & 입자 시스템 설정 ---
        const MAX_POINTS = 35000;
        const geometry = new THREE.BufferGeometry();
        
        const positions = new Float32Array(MAX_POINTS * 3);
        const colors = new Float32Array(MAX_POINTS * 3);

        // 로렌츠 상수
        const a = 10, b = 28, c = 8/3;
        let x = 0.1, y = 0, z = 0;
        let dt = 0.005;

        // 초기 배열 채우기 (모두 중심 근처에서 시작)
        for(let i = 0; i < MAX_POINTS; i++) {
            // 로렌츠 방정식 미분 계산
            let dx = a * (y - x) * dt;
            let dy = (x * (b - z) - y) * dt;
            let dz = (x * y - c * z) * dt;
            x += dx;
            y += dy;
            z += dz;

            // 중심을 맞추기 위해 Z축 이동 조정 (로렌츠는 대략 Z가 25 근처가 중심)
            positions[i*3] = x;
            positions[i*3+1] = y;
            positions[i*3+2] = z - 25; 

            // 초기 색상 (암흑 상태 - 깊은 우주의 블루/블랙)
            colors[i*3] = 0.05;
            colors[i*3+1] = 0.1;
            colors[i*3+2] = 0.2;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // 빛나는 입자 효과를 위한 커스텀 텍스처 (둥근 그라데이션)
        const createParticleTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvas);
        };

        const material = new THREE.PointsMaterial({
            size: 0.4,
            map: createParticleTexture(),
            vertexColors: true,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // --- 3. 개기일식 중앙 태양 매커니즘 (가상 코어) ---
        // 일식 순간 달에 가려진 검은 구체
        const moonGeo = new THREE.SphereGeometry(2, 32, 32);
        const moonMat = new THREE.MeshBasicMaterial({ color: 0x010103 });
        const moon = new THREE.Mesh(moonGeo, moonMat);
        scene.add(moon);

        // 드라마틱하게 피어오를 태양 광선 중심지
        const sunLight = new THREE.PointLight(0xffaa44, 0, 100);
        scene.add(sunLight);

        // --- 4. 애니메이션 및 시간 축에 따른 드라마틱 연출 ---
        let clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const elapsedTime = clock.getElapsedTime();
            const posAttr = geometry.attributes.position;
            const colAttr = geometry.attributes.color;

            // [드라마틱 타임라인 연출]
            // 0~5초: 완전한 개기일식 (차가운 적막)
            // 5~20초: 태양이 천천히 살아나며 코로나가 뿜어져 나옴
            // 20초 이후: 완전한 각성 및 다이아몬드 링 효과
            let eclipseProgress = Math.min(Math.max((elapsedTime - 4) / 18, 0), 1); 

            // 로렌츠 어트랙터 실시간 회전 및 미세 유동
            particleSystem.rotation.z = elapsedTime * 0.05;
            particleSystem.rotation.y = elapsedTime * 0.08;

            // 입자들을 역동적으로 요동치게 만들며 색상 전이 계산
            for(let i = 0; i < MAX_POINTS; i++) {
                let idx = i * 3;
                
                // 시간이 지남에 따라 나중에 생성되는 바깥쪽 입자일수록 더 강렬한 빛을 받음
                let distanceToCenter = Math.sqrt(posAttr.array[idx]**2 + posAttr.array[idx+1]**2 + posAttr.array[idx+2]**2);
                
                // 감성적 색상 전이 (차가운 블루 -> 활활 타오르는 태양의 골드/오렌지)
                if (eclipseProgress > 0) {
                    // 내부 입자부터 서서히 에너지가 차오름
                    let wave = Math.sin(distanceToCenter * 0.1 - elapsedTime * 2) * 0.5 + 0.5;
                    let activation = eclipseProgress * (1 + wave * 0.3);

                    // 기본 블루 위에 서서히 얹어지는 태양의 코로나 빛
                    colAttr.array[idx] = THREE.MathUtils.lerp(0.05, 1.0, Math.min(activation * 1.2, 1));     // R
                    colAttr.array[idx+1] = THREE.MathUtils.lerp(0.1, 0.5 + (Math.sin(elapsedTime)*0.2), activation); // G (오렌지-옐로우 조율)
                    colAttr.array[idx+2] = THREE.MathUtils.lerp(0.4, 0.1, eclipseProgress);                 // B (블루 감소)
                }

                // 미세한 카오스 요동 효과 추가 (코로나의 이글거림 표현)
                if(eclipseProgress > 0.5) {
                    posAttr.array[idx] += Math.sin(elapsedTime + i) * 0.005 * eclipseProgress;
                    posAttr.array[idx+1] += Math.cos(elapsedTime + i) * 0.005 * eclipseProgress;
                }
            }
            
            // 데이터 업데이트 플래그
            colAttr.needsUpdate = true;
            if(eclipseProgress > 0.5) posAttr.needsUpdate = true;

            // 입자 크기 동적 연출 (태양이 나타나며 더 눈부시게 커짐)
            material.size = THREE.MathUtils.lerp(0.3, 0.6, eclipseProgress);

            // 카메라 움직임으로 공간감 극대화
            if (elapsedTime < 25) {
                camera.position.z = THREE.MathUtils.lerp(90, 65, eclipseProgress);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // --- 5. 리사이즈 대응 ---
        window.addEventListener('resize', onWindowResize, false);

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 시스템 기동
        animate();
    </script>
</body>
</html>
