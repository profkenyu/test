<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>Frenet–Serret Cathedral | Exhibition Edition</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#02030a;
    touch-action:none;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
}

#ui{
    position:fixed;
    top:14px;
    left:14px;
    color:rgba(255,255,255,.85);
    background:rgba(0,0,0,.35);
    padding:12px 14px;
    border-radius:12px;
    backdrop-filter:blur(12px);
    font-size:12px;
    letter-spacing:2px;
    z-index:10;
    line-height:1.7;
}

#signature{
    position:fixed;
    right:14px;
    bottom:10px;
    color:rgba(255,255,255,.35);
    font-size:11px;
    letter-spacing:2px;
    z-index:10;
}
</style>
</head>

<body>

<div id="ui">
FRENET–SERRET CATHEDRAL1<br>
EXHIBITION EDITION<br><br>

Drag : Rotate<br>
Wheel / Pinch : Zoom<br>
Double Tap : Curvature Burst
</div>

<div id="signature">
Curvature Generates Space
</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";
import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js";

const scene = new THREE.Scene();

scene.fog = new THREE.FogExp2(0x040510,0.022);

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth/window.innerHeight,
    0.1,
    2000
);

camera.position.set(0,8,26);

const renderer = new THREE.WebGLRenderer({
    antialias:true,
    powerPreference:"high-performance"
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.setPixelRatio(
    Math.min(window.devicePixelRatio,2)
);

document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(
    camera,
    renderer.domElement
);

controls.enableDamping = true;
controls.dampingFactor = 0.05;

scene.add(
    new THREE.AmbientLight(0xffffff,1.4)
);

const pointLight = new THREE.PointLight(
    0xffffff,
    2,
    300
);

pointLight.position.set(0,30,20);
scene.add(pointLight);

const cathedral = new THREE.Group();
scene.add(cathedral);

let curveLine;
let normalGroup = new THREE.Group();
let binormalGroup = new THREE.Group();

cathedral.add(normalGroup);
cathedral.add(binormalGroup);

const PARTICLES = 28000;

const particleGeo = new THREE.BufferGeometry();

const positions = new Float32Array(PARTICLES*3);
const colors = new Float32Array(PARTICLES*3);

particleGeo.setAttribute(
    "position",
    new THREE.BufferAttribute(positions,3)
);

particleGeo.setAttribute(
    "color",
    new THREE.BufferAttribute(colors,3)
);

const particleMat = new THREE.PointsMaterial({
    size:0.06,
    transparent:true,
    opacity:0.95,
    vertexColors:true,
    blending:THREE.AdditiveBlending,
    depthWrite:false
});

const particles = new THREE.Points(
    particleGeo,
    particleMat
);

cathedral.add(particles);

let burst = 0;

function curve(s,t){

    const R =
        5 +
        1.2*Math.sin(s*3+t*0.4);

    const x =
        Math.cos(s)*R;

    const y =
        Math.sin(s)*R;

    const z =
        3*Math.sin(s*2+t*0.3);

    return new THREE.Vector3(x,y,z);
}

function tangent(s,t){

    const e = 0.001;

    const p1 = curve(s,t);
    const p2 = curve(s+e,t);

    return p2.sub(p1).normalize();
}

function normal(s,t){

    const e = 0.001;

    const t1 = tangent(s,t);
    const t2 = tangent(s+e,t);

    return t2.sub(t1).normalize();
}

function binormal(tan,nor){

    return new THREE.Vector3()
        .crossVectors(tan,nor)
        .normalize();
}

function build(time){

    if(curveLine){
        cathedral.remove(curveLine);
    }

    while(normalGroup.children.length){
        normalGroup.remove(normalGroup.children[0]);
    }

    while(binormalGroup.children.length){
        binormalGroup.remove(binormalGroup.children[0]);
    }

    const pts = [];

    for(let i=0;i<1800;i++){

        const s = i*0.018;

        pts.push(
            curve(s,time)
        );
    }

    const geo =
        new THREE.BufferGeometry()
        .setFromPoints(pts);

    const lineColors = [];

    for(let i=0;i<pts.length;i++){

        const hue =
            (i/pts.length + time*0.03)%1;

        const c =
            new THREE.Color()
            .setHSL(hue,1,0.72);

        lineColors.push(c.r,c.g,c.b);
    }

    geo.setAttribute(
        "color",
        new THREE.Float32BufferAttribute(
            lineColors,
            3
        )
    );

    curveLine = new THREE.Line(
        geo,
        new THREE.LineBasicMaterial({
            vertexColors:true,
            transparent:true,
            opacity:0.95
        })
    );

    cathedral.add(curveLine);

    for(let i=0;i<pts.length;i+=20){

        const s = i*0.018;

        const p = pts[i];

        const T = tangent(s,time);
        const N = normal(s,time);

        if(!isFinite(N.x)) continue;

        const B = binormal(T,N);

        const len =
            1.2 +
            Math.sin(time+s)*0.8 +
            burst;

        const nEnd =
            p.clone().add(
                N.clone().multiplyScalar(len*2)
            );

        const bEnd =
            p.clone().add(
                B.clone().multiplyScalar(len*1.5)
            );

        const ng =
            new THREE.BufferGeometry()
            .setFromPoints([p,nEnd]);

        const bg =
            new THREE.BufferGeometry()
            .setFromPoints([p,bEnd]);

        const nl = new THREE.Line(
            ng,
            new THREE.LineBasicMaterial({
                color:0x66aaff,
                transparent:true,
                opacity:0.22
            })
        );

        const bl = new THREE.Line(
            bg,
            new THREE.LineBasicMaterial({
                color:0xaa66ff,
                transparent:true,
                opacity:0.15
            })
        );

        normalGroup.add(nl);
        binormalGroup.add(bl);
    }

    const pos =
        particleGeo.attributes.position.array;

    const col =
        particleGeo.attributes.color.array;

    for(let i=0;i<PARTICLES;i++){

        const id =
            (i*13)%pts.length;

        const s = id*0.018;

        const p = pts[id];

        const T = tangent(s,time);
        const N = normal(s,time);

        if(!isFinite(N.x)) continue;

        const B = binormal(T,N);

        const a =
            Math.sin(i*0.01+time)*2.8;

        const b =
            Math.cos(i*0.013+time*0.7)*2.2;

        const v =
            p.clone()
            .add(
                N.clone().multiplyScalar(a)
            )
            .add(
                B.clone().multiplyScalar(b)
            );

        pos[i*3] = v.x;
        pos[i*3+1] = v.y;
        pos[i*3+2] = v.z;

        col[i*3] =
            0.5+0.5*Math.sin(i*0.01+time);

        col[i*3+1] =
            0.5+0.5*Math.sin(
                i*0.01+time+2.094
            );

        col[i*3+2] =
            0.5+0.5*Math.sin(
                i*0.01+time+4.188
            );
    }

    particleGeo.attributes.position.needsUpdate = true;
    particleGeo.attributes.color.needsUpdate = true;
}

let time = 0;

function animate(){

    requestAnimationFrame(animate);

    time += 0.008;

    burst *= 0.985;

    build(time);

    cathedral.rotation.y += 0.0012;

    cathedral.rotation.x =
        Math.sin(time*0.15)*0.12;

    const r =
        10 +
        10*Math.sin(time*0.5);

    const g =
        10 +
        10*Math.sin(time*0.5+2);

    const b =
        20 +
        15*Math.sin(time*0.5+4);

    scene.background =
        new THREE.Color(
            `rgb(${r|0},${g|0},${b|0})`
        );

    controls.update();

    renderer.render(scene,camera);
}

animate();

window.addEventListener(
    "resize",
    ()=>{

        camera.aspect =
            window.innerWidth/
            window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );
    }
);

let lastTap = 0;

window.addEventListener(
    "touchstart",
    e=>{

        const now = Date.now();

        if(now-lastTap < 300){

            burst = 4.0;
        }

        lastTap = now;
    }
);

window.addEventListener(
    "dblclick",
    ()=>{

        burst = 4.0;
    }
);

</script>

</body>
</html>
