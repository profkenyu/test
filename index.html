<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VOID DRIFT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --crimson: #c0152a;
  --crimson-dim: rgba(192,21,42,0.4);
  --ice: #a8d8f0;
  --ice-dim: rgba(168,216,240,0.3);
  --gold: #e8c97a;
  --white: #f0eeea;
  --bg: #050507;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  overflow: hidden;
  font-family: 'Space Mono', 'Courier New', monospace;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

canvas {
  position: absolute;
  top: 0; left: 0;
  display: block;
}

#bgCanvas { z-index: 1; }
#gameCanvas { z-index: 2; }

/* ── SCREENS ── */
.screen {
  position: absolute;
  inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(1.5rem, 5vh, 2.5rem);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
}
.screen.visible {
  opacity: 1;
  pointer-events: all;
}

/* ── START SCREEN ── */
.brand {
  text-align: center;
  line-height: 1;
}
.brand-main {
  font-size: clamp(3.5rem, 14vw, 5.5rem);
  font-weight: 700;
  letter-spacing: 0.25em;
  color: var(--white);
  text-shadow: 0 0 40px rgba(168,216,240,0.5), 0 0 80px rgba(168,216,240,0.2);
}
.brand-sub {
  font-size: clamp(0.55rem, 2.2vw, 0.7rem);
  letter-spacing: 0.35em;
  color: rgba(0, 255, 238, 0.522);
  text-transform: uppercase;
  margin-top: 0.4em;
}

.time-label {
  font-size: clamp(0.5rem, 2vw, 0.6rem);
  letter-spacing: 0.4em;
  color: rgba(255, 170, 0, 0.432);
  text-transform: uppercase;
}

.time-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
  width: min(300px, 78vw);
}

.time-btn {
  position: relative;
  background: transparent;
  border: 1px solid rgba(255, 170, 0, 0.271);
  color: var(--white);
  font-family: 'Space Mono', monospace;
  font-size: clamp(1.1rem, 4.5vw, 1.4rem);
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: clamp(0.8rem,3vh,1.1rem) 0;
  cursor: pointer;
  transition: all 0.2s;
  overflow: hidden;
}
.time-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--crimson);
  opacity: 0;
  transition: opacity 0.15s;
}
.time-btn:active::before { opacity: 0.25; }
.time-btn .unit {
  display: block;
  font-size: 0.5em;
  letter-spacing: 0.3em;
  opacity: 0.35;
  margin-top: 0.2em;
}

.hint {
  font-size: clamp(0.48rem, 1.8vw, 0.58rem);
  letter-spacing: 0.25em;
  color: rgba(0, 255, 238, 0.522);
  text-align: center;
  line-height: 1.9;
}

/* ── HUD ── */
#hud {
  position: absolute;
  inset: 0;
  z-index: 8;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
#hud.visible { opacity: 1; }

.hud-top {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: clamp(0.8rem,3vw,1.2rem) clamp(1rem,4vw,1.8rem);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.hud-score-val {
  font-size: clamp(1.6rem, 6vw, 2.2rem);
  font-weight: 700;
  color: var(--white);
  letter-spacing: 0.05em;
  line-height: 1;
  text-shadow: 0 0 20px rgba(168,216,240,0.4);
}
.hud-score-label {
  font-size: clamp(0.45rem, 1.8vw, 0.55rem);
  letter-spacing: 0.35em;
  color: rgba(240,238,234,0.25);
  text-transform: uppercase;
  margin-top: 0.3em;
}

.hud-time-val {
  font-size: clamp(1.6rem, 6vw, 2.2rem);
  font-weight: 700;
  color: rgba(240,238,234,0.6);
  letter-spacing: 0.05em;
  text-align: right;
  line-height: 1;
  transition: color 0.3s, text-shadow 0.3s;
}
.hud-time-val.danger {
  color: var(--crimson);
  text-shadow: 0 0 20px rgba(192,21,42,0.7);
  animation: blink 0.5s infinite alternate;
}

@keyframes blink { from { opacity:1; } to { opacity:0.4; } }

.hud-lives {
  display: flex;
  gap: 0.45rem;
  margin-top: 0.5rem;
  justify-content: flex-end;
}
.life-pip {
  width: clamp(6px,2vw,9px);
  height: clamp(6px,2vw,9px);
  border-radius: 50%;
  background: var(--white);
  box-shadow: 0 0 6px rgba(168,216,240,0.8);
  transition: all 0.2s;
}
.life-pip.dead {
  background: transparent;
  border: 1px solid rgba(240,238,234,0.2);
  box-shadow: none;
}

/* ── WAVE TOAST ── */
.wave-toast {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 9;
  font-size: clamp(0.55rem, 2.2vw, 0.7rem);
  letter-spacing: 0.5em;
  color: rgba(240,238,234,0.5);
  text-transform: uppercase;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s;
}
.wave-toast.show { opacity: 1; }

/* ── GAME OVER ── */
#gameoverScreen .result-label {
  font-size: clamp(0.5rem, 2vw, 0.62rem);
  letter-spacing: 0.4em;
  color: rgba(240,238,234,0.3);
  text-transform: uppercase;
}
#gameoverScreen .result-score {
  font-size: clamp(4rem, 18vw, 7rem);
  font-weight: 700;
  color: var(--white);
  letter-spacing: 0.1em;
  line-height: 1;
  text-shadow: 0 0 60px rgba(168,216,240,0.3);
}
#gameoverScreen .result-msg {
  font-size: clamp(0.5rem, 2vw, 0.62rem);
  letter-spacing: 0.3em;
  color: rgba(240,238,234,0.25);
  text-transform: uppercase;
  margin-top: -0.5rem;
}

.action-btn {
  background: transparent;
  border: 1px solid rgba(240,238,234,0.25);
  color: rgba(240,238,234,0.7);
  font-family: 'Space Mono', monospace;
  font-size: clamp(0.6rem, 2.2vw, 0.72rem);
  letter-spacing: 0.3em;
  padding: 0.9rem 2.2rem;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s;
}
.action-btn:active {
  background: rgba(240,238,234,0.07);
  border-color: rgba(240,238,234,0.5);
}
.action-btn.primary {
  border-color: var(--ice);
  color: var(--ice);
  box-shadow: 0 0 18px rgba(168,216,240,0.2);
}
.action-btn.primary:active {
  background: rgba(168,216,240,0.1);
}

.result-btn-row {
  display: flex;
  gap: 0.75rem;
  margin-top: 0.5rem;
  flex-wrap: wrap;
  justify-content: center;
}

.result-stage {
  font-size: clamp(0.5rem, 2vw, 0.62rem);
  letter-spacing: 0.5em;
  color: rgba(168,216,240,0.45);
  text-transform: uppercase;
}
.result-stage.win {
  color: var(--gold);
  text-shadow: 0 0 24px rgba(232,201,122,0.6);
  letter-spacing: 0.6em;
}

#gameoverScreen .result-score.win {
  text-shadow: 0 0 60px rgba(232,201,122,0.5), 0 0 20px rgba(232,201,122,0.3);
}

#gameoverScreen .result-label.win {
  font-size: clamp(1.8rem, 7vw, 2.8rem);
  font-weight: 700;
  letter-spacing: 0.3em;
  color: var(--gold);
  text-shadow: 0 0 40px rgba(232,201,122,0.7);
}

.hud-stage-val {
  font-size: clamp(0.5rem, 1.8vw, 0.6rem);
  letter-spacing: 0.4em;
  color: rgba(168,216,240,0.35);
  text-transform: uppercase;
  text-align: center;
  padding-top: 0.5rem;
}

/* ── WIN SCREEN ── */
#winScreen {
  position: absolute;
  inset: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s ease;
}
#winScreen.visible {
  opacity: 1;
  pointer-events: all;
}

#winCanvas {
  position: absolute;
  inset: 0;
  z-index: 0;
  width: 100%;
  height: 100%;
}

#winContent {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(0.6rem, 2.5vh, 1.2rem);
  text-align: center;
}

#winStageLabel {
  font-size: clamp(0.5rem, 2vw, 0.65rem);
  letter-spacing: 0.55em;
  color: rgba(232,201,122,0.55);
  text-transform: uppercase;
  animation: winFadeUp 1s 0.2s both;
}

#winText {
  font-size: clamp(5rem, 24vw, 10rem);
  font-weight: 700;
  letter-spacing: 0.12em;
  line-height: 1;
  color: #fff;
  text-shadow:
    0 0 30px #e8c97a,
    0 0 60px #e8c97a,
    0 0 120px rgba(232,201,122,0.6),
    0 0 200px rgba(232,201,122,0.3);
  animation: winPop 0.7s 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both,
             winPulse 2.5s 1.2s ease-in-out infinite;
}

#winScoreLabel {
  font-size: clamp(0.48rem, 1.9vw, 0.6rem);
  letter-spacing: 0.45em;
  color: rgba(232,201,122,0.4);
  text-transform: uppercase;
  animation: winFadeUp 1s 1s both;
}

#winScore {
  font-size: clamp(2.5rem, 12vw, 5rem);
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--gold);
  text-shadow: 0 0 40px rgba(232,201,122,0.5);
  line-height: 1;
  animation: winFadeUp 1s 1.1s both;
}

#winBtnRow {
  display: flex;
  gap: 0.75rem;
  margin-top: clamp(0.5rem, 2vh, 1.2rem);
  animation: winFadeUp 1s 1.4s both;
}

@keyframes winPop {
  from { transform: scale(0.3); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
@keyframes winPulse {
  0%, 100% { text-shadow: 0 0 30px #e8c97a, 0 0 60px #e8c97a, 0 0 120px rgba(232,201,122,0.6); }
  50%       { text-shadow: 0 0 50px #e8c97a, 0 0 100px #e8c97a, 0 0 200px rgba(232,201,122,0.8), 0 0 320px rgba(232,201,122,0.3); }
}
@keyframes winFadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── WEAPON HUD ── */
#weaponHud {
  position: absolute;
  bottom: clamp(1.2rem, 5vh, 2rem);
  left: 50%;
  transform: translateX(-50%);
  z-index: 9;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.35rem;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  min-width: 130px;
}
#weaponHud.visible { opacity: 1; }

.weapon-name {
  font-size: clamp(0.5rem, 2vw, 0.6rem);
  letter-spacing: 0.45em;
  text-transform: uppercase;
  text-align: center;
  color: var(--white);
  transition: color 0.3s;
}
.weapon-bar-bg {
  width: 100px;
  height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
}
.weapon-bar-fill {
  height: 100%;
  width: 100%;
  border-radius: 2px;
  transform-origin: left;
  transition: background 0.3s;
}

/* ── BOMB HINT ── */
.bomb-hint {
  position: absolute;
  bottom: clamp(4rem, 10vh, 6rem);
  right: clamp(1rem, 4vw, 1.8rem);
  z-index: 9;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 0.2rem;
  pointer-events: none;
}
.bomb-hint.visible { display: flex; }
.bomb-count {
  font-size: clamp(1.4rem, 5vw, 2rem);
  font-weight: 700;
  color: #ff6644;
  text-shadow: 0 0 16px rgba(255,102,68,0.7);
  line-height: 1;
}
.bomb-label {
  font-size: clamp(0.42rem, 1.6vw, 0.52rem);
  letter-spacing: 0.3em;
  color: rgba(255,102,68,0.55);
  text-transform: uppercase;
}

/* ── BGM TOGGLE BUTTON ── */
#bgmBtn {
  position: fixed;
  bottom: clamp(1.2rem, 4.5vh, 2rem);
  left: clamp(1rem, 4vw, 1.8rem);
  z-index: 20;
  background: transparent;
  border: 1px solid rgba(240,238,234,0.14);
  color: rgba(240,238,234,0.4);
  font-family: 'Space Mono', monospace;
  font-size: clamp(0.5rem, 1.8vw, 0.62rem);
  letter-spacing: 0.3em;
  padding: 0.5rem 0.8rem;
  cursor: pointer;
  transition: color 0.35s, border-color 0.35s, opacity 0.35s;
  pointer-events: all;
  text-transform: uppercase;
  line-height: 1;
  user-select: none;
  -webkit-user-select: none;
}
#bgmBtn:hover {
  color: rgba(240,238,234,0.65);
  border-color: rgba(240,238,234,0.28);
}
#bgmBtn.bgm-off {
  color: rgba(240,238,234,0.18);
  border-color: rgba(240,238,234,0.07);
}

/* ── SCANLINE OVERLAY ── */
.scanline {
  position: absolute;
  inset: 0;
  z-index: 15;
  background: repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.04) 3px,
    rgba(0,0,0,0.04) 4px
  );
  pointer-events: none;
}

/* ── VIGNETTE ── */
.vignette {
  position: absolute;
  inset: 0;
  z-index: 7;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.65) 100%);
  pointer-events: none;
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="gameCanvas"></canvas>
<div class="vignette"></div>
<div class="scanline"></div>

<!-- START SCREEN -->
<div class="screen visible" id="startScreen">
  <div class="brand">
    <div class="brand-main">VOID</div>
    <div class="brand-sub">drift · shoot · survive</div>
  </div>

  <div class="time-label">— select duration —</div>

  <div class="time-grid">
    <button class="time-btn" data-sec="30" onclick="startGame(30)">
      30<span class="unit">SEC</span>
    </button>
    <button class="time-btn" data-sec="60" onclick="startGame(60)">
      60<span class="unit">SEC</span>
    </button>
    <button class="time-btn" data-sec="90" onclick="startGame(90)">
      90<span class="unit">SEC</span>
    </button>
    <button class="time-btn" data-sec="120" onclick="startGame(120)">
      120<span class="unit">SEC</span>
    </button>
  </div>

  <div class="hint">
    손가락을 올려놓으면 함선이 따라옵니다<br>
    아이템을 획득해 무기를 업그레이드하세요<br>
    더블탭 → BOMB 발사
  </div>
</div>

<!-- WIN SCREEN -->
<div id="winScreen">
  <canvas id="winCanvas"></canvas>
  <div id="winContent">
    <div id="winStageLabel">ALL STAGES CLEAR</div>
    <div id="winText">WIN</div>
    <div id="winScoreLabel">FINAL SCORE</div>
    <div id="winScore">0</div>
    <div id="winBtnRow">
      <button class="action-btn" onclick="showStartFromWin()">처음으로</button>
      <button class="action-btn primary" onclick="restartFromWin()">다시하기</button>
    </div>
  </div>
</div>

<!-- GAME OVER SCREEN -->
<div class="screen" id="gameoverScreen">
  <div class="result-stage" id="finalStage">STAGE 1</div>
  <div class="result-label" id="resultLabel">score</div>
  <div class="result-score" id="finalScore">0</div>
  <div class="result-msg" id="finalMsg">time expired</div>
  <div class="result-btn-row" id="resultBtnRow">
    <!-- populated by endGame() -->
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-top">
    <div>
      <div class="hud-score-val" id="scoreVal">0</div>
      <div class="hud-score-label">score</div>
    </div>
    <div style="text-align:center">
      <div class="hud-stage-val" id="stageVal">STAGE 1</div>
    </div>
    <div>
      <div class="hud-time-val" id="timeVal">0:00</div>
      <div class="hud-lives" id="livesEl"></div>
    </div>
  </div>
</div>

<div class="wave-toast" id="waveToast"></div>

<!-- WEAPON HUD -->
<div id="weaponHud">
  <div class="weapon-name" id="weaponName">NORMAL</div>
  <div class="weapon-bar-bg">
    <div class="weapon-bar-fill" id="weaponBar"></div>
  </div>
</div>

<!-- BOMB COUNT -->
<div class="bomb-hint" id="bombHint">
  <div class="bomb-count" id="bombCount">0</div>
  <div class="bomb-label">BOMB<br>더블탭</div>
</div>

<!-- BGM TOGGLE -->
<button id="bgmBtn" onclick="bgmToggle()">♪&nbsp;BGM</button>

<script>
"use strict";

// ─────────────────────────────────────────────────────────────────────────────
// AUDIO ENGINE  — Web Audio API  procedural synthesis
// ─────────────────────────────────────────────────────────────────────────────
let _ac = null;
let _sndLaserOsc = null, _sndLaserGain = null;

function _getAC() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  if (_ac.state === 'suspended') _ac.resume();
  return _ac;
}

// oscillator one-shot: freq → freqEnd over dur seconds at vol
function _osc(freq, type, dur, vol, freqEnd) {
  try {
    const a = _getAC();
    const o = a.createOscillator();
    const g = a.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, a.currentTime);
    if (freqEnd != null) o.frequency.exponentialRampToValueAtTime(freqEnd, a.currentTime + dur);
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + dur);
    o.connect(g); g.connect(a.destination);
    o.start(); o.stop(a.currentTime + dur);
  } catch(e) {}
}

// white noise burst with lowpass shaping
function _noise(dur, vol, lpFreq) {
  try {
    const a = _getAC();
    const len = Math.ceil(a.sampleRate * dur);
    const buf = a.createBuffer(1, len, a.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const src = a.createBufferSource();
    src.buffer = buf;
    const filt = a.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.setValueAtTime(lpFreq || 8000, a.currentTime);
    const g = a.createGain();
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + dur);
    src.connect(filt); filt.connect(g); g.connect(a.destination);
    src.start(); src.stop(a.currentTime + dur);
  } catch(e) {}
}

// ── SHOOT SOUNDS ─────────────────────────────────────────────────────────────
function sndShoot(weapon) {
  switch (weapon) {
    case 'normal':
      _osc(1400, 'sine',     0.07, 0.07, 500);
      break;
    case 'spread':
      _osc(1600, 'sawtooth', 0.05, 0.04, 800);
      _osc(1900, 'sine',     0.05, 0.03, 1000);
      _osc(1200, 'sine',     0.05, 0.03, 700);
      break;
    case 'rapid':
      _osc(2400, 'square',   0.035, 0.035, 1600);
      break;
  }
}

// ── LASER HUM (continuous) ───────────────────────────────────────────────────
function sndStartLaser() {
  try {
    if (_sndLaserOsc) return;
    const a = _getAC();
    _sndLaserOsc  = a.createOscillator();
    _sndLaserGain = a.createGain();
    _sndLaserOsc.type = 'sawtooth';
    _sndLaserOsc.frequency.setValueAtTime(160, a.currentTime);
    _sndLaserOsc.frequency.linearRampToValueAtTime(210, a.currentTime + 0.25);
    _sndLaserGain.gain.setValueAtTime(0.0001, a.currentTime);
    _sndLaserGain.gain.linearRampToValueAtTime(0.08, a.currentTime + 0.12);
    _sndLaserOsc.connect(_sndLaserGain);
    _sndLaserGain.connect(a.destination);
    _sndLaserOsc.start();
  } catch(e) {}
}

function sndStopLaser() {
  try {
    if (!_sndLaserOsc) return;
    const a = _getAC();
    _sndLaserGain.gain.setValueAtTime(_sndLaserGain.gain.value, a.currentTime);
    _sndLaserGain.gain.linearRampToValueAtTime(0.0001, a.currentTime + 0.18);
    _sndLaserOsc.stop(a.currentTime + 0.2);
    _sndLaserOsc = null; _sndLaserGain = null;
  } catch(e) {}
}

// ── EXPLOSION SOUNDS ─────────────────────────────────────────────────────────
function sndExplosion(type) {
  switch (type) {
    case 'bulk':   // 묵직한 폭발
      _noise(0.45, 0.28, 900);

function _initAudio() {

// ─────────────────────────────────────────────────────────────────────────────
// BGM ENGINE — procedural ambient synthesizer
// Three layers: sub-bass drone · detuned pad · sparse arpeggio
// Two modes:  'ambient' (menu / game over)  'active' (in-game)
// ─────────────────────────────────────────────────────────────────────────────
let _bgmEnabled  = true;
let _bgmRunning  = false;
let _bgmNodes    = {};
let _bgmSeqPos   = 0;
let _bgmTimeout  = null;
let _bgmMode     = 'ambient';

// Pentatonic minor sequences — 8th-note steps, 0 = rest
const _BGM_SEQ = {
  ambient: [
    110, 0, 0, 0,   0, 0, 146.8, 0,
    0, 0, 130.8, 0,  0, 0, 0, 0,
    164.8, 0, 0, 0,  110, 0, 0, 196,
  ],
  active: [
    110, 0, 146.8, 0,  0, 130.8, 0, 0,
    164.8, 0, 0, 110,  0, 196, 0, 0,
    220, 0, 0, 0,      146.8, 0, 164.8, 0,
  ],
};

// ms per 8th note
const _BGM_TEMPO = { ambient: 420, active: 310 };

function bgmStart() {
  if (_bgmRunning || !_bgmEnabled) return;
  try {
    const a = _getAC();
    _bgmRunning = true;

    // ── master gain ──
    const master = a.createGain();
    master.gain.setValueAtTime(0.0001, a.currentTime);
    master.gain.linearRampToValueAtTime(0.55, a.currentTime + 2.8);
    master.connect(a.destination);
    _bgmNodes.master = master;

    // ── sub-bass drone (41 Hz / E1) ──
    const bass      = a.createOscillator();
    const bassGain  = a.createGain();
    bass.type       = 'sine';
    bass.frequency.setValueAtTime(41.2, a.currentTime);
    bassGain.gain.setValueAtTime(0.26, a.currentTime);
    bass.connect(bassGain);
    bassGain.connect(master);
    bass.start();
    _bgmNodes.bass = bass; _bgmNodes.bassGain = bassGain;

    // LFO — slow breath (9 sec cycle)
    const lfo     = a.createOscillator();
    const lfoGain = a.createGain();
    lfo.type      = 'sine';
    lfo.frequency.setValueAtTime(0.11, a.currentTime);
    lfoGain.gain.setValueAtTime(0.09, a.currentTime);
    lfo.connect(lfoGain);
    lfoGain.connect(bassGain.gain);
    lfo.start();
    _bgmNodes.lfo = lfo; _bgmNodes.lfoGain = lfoGain;

    // ── pad — two detuned saws → LP filter ──
    const pad1    = a.createOscillator();
    const pad2    = a.createOscillator();
    const padFilt = a.createBiquadFilter();
    const padGain = a.createGain();
    pad1.type = pad2.type = 'sawtooth';
    pad1.frequency.setValueAtTime(110,   a.currentTime);
    pad2.frequency.setValueAtTime(110.7, a.currentTime); // subtle chorus
    padFilt.type = 'lowpass';
    padFilt.frequency.setValueAtTime(480, a.currentTime);
    padFilt.Q.setValueAtTime(1.8, a.currentTime);
    padGain.gain.setValueAtTime(0.05, a.currentTime);
    pad1.connect(padFilt); pad2.connect(padFilt);
    padFilt.connect(padGain); padGain.connect(master);
    pad1.start(); pad2.start();
    _bgmNodes.pad1 = pad1; _bgmNodes.pad2 = pad2;
    _bgmNodes.padFilt = padFilt; _bgmNodes.padGain = padGain;

    // pad filter LFO — slow sweep (20 sec cycle)
    const padLfo     = a.createOscillator();
    const padLfoGain = a.createGain();
    padLfo.type      = 'sine';
    padLfo.frequency.setValueAtTime(0.05, a.currentTime);
    padLfoGain.gain.setValueAtTime(260, a.currentTime);
    padLfo.connect(padLfoGain);
    padLfoGain.connect(padFilt.frequency);
    padLfo.start();
    _bgmNodes.padLfo = padLfo; _bgmNodes.padLfoGain = padLfoGain;

    // ── start arpeggiator ──
    _bgmSeqPos = 0;
    _bgmSchedule();

  } catch(e) { console.warn('BGM:', e); }
}

function _bgmSchedule() {
  if (!_bgmRunning) return;
  _bgmTimeout = setTimeout(() => {
    _bgmArpStep();
    _bgmSchedule();
  }, _BGM_TEMPO[_bgmMode]);
}

function _bgmArpStep() {
  if (!_bgmEnabled || !_bgmNodes.master) return;
  try {
    const seq  = _BGM_SEQ[_bgmMode];
    const freq = seq[_bgmSeqPos % seq.length];
    _bgmSeqPos++;
    if (!freq) return;

    const a    = _getAC();
    const o    = a.createOscillator();
    const filt = a.createBiquadFilter();
    const g    = a.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(freq * 2, a.currentTime);
    filt.type = 'bandpass';
    filt.frequency.setValueAtTime(freq * 2, a.currentTime);
    filt.Q.setValueAtTime(4.5, a.currentTime);
    g.gain.setValueAtTime(0.13, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + 0.42);
    o.connect(filt); filt.connect(g); g.connect(_bgmNodes.master);
    o.start(); o.stop(a.currentTime + 0.48);
  } catch(e) {}
}

// Switch between ambient (menu/gameover) and active (in-game)
function bgmSetMode(mode) {
  if (_bgmMode === mode) return;
  _bgmMode   = mode;
  _bgmSeqPos = 0;
  if (!_bgmNodes.padFilt) return;
  try {
    const a    = _getAC();
    const filt = mode === 'active' ? 850 : 480;
    const pvol = mode === 'active' ? 0.08 : 0.05;
    _bgmNodes.padFilt.frequency.linearRampToValueAtTime(filt, a.currentTime + 1.5);
    _bgmNodes.padGain.gain.linearRampToValueAtTime(pvol,  a.currentTime + 1.2);
  } catch(e) {}
}

function bgmStop(instant) {
  _bgmRunning = false;
  if (_bgmTimeout) { clearTimeout(_bgmTimeout); _bgmTimeout = null; }
  if (!_bgmNodes.master) return;
  try {
    const a   = _getAC();
    const dur = instant ? 0.08 : 1.8;
    _bgmNodes.master.gain.setValueAtTime(_bgmNodes.master.gain.value, a.currentTime);
    _bgmNodes.master.gain.linearRampToValueAtTime(0.0001, a.currentTime + dur);
    ['bass','lfo','pad1','pad2','padLfo'].forEach(k => {
      try { if (_bgmNodes[k]) _bgmNodes[k].stop(a.currentTime + dur + 0.1); } catch(e) {}
    });
    setTimeout(() => { _bgmNodes = {}; }, (dur + 0.6) * 1000);
  } catch(e) {}
}

function bgmToggle() {
  _bgmEnabled = !_bgmEnabled;
  const btn = document.getElementById('bgmBtn');
  if (_bgmEnabled) {
    btn.textContent = '♪\u00a0BGM';
    btn.classList.remove('bgm-off');
    bgmStart();
  } else {
    btn.textContent = '♩\u00a0BGM';
    btn.classList.add('bgm-off');
    bgmStop();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// BACKGROUND  — starfield + nebula
// ─────────────────────────────────────────────────────────────────────────────
const bgCvs = document.getElementById('bgCanvas');
const bgCtx = bgCvs.getContext('2d');
let stars = [], nebula = [];

// ── background state (controllable) ────────────────────────────────────────
let bgState = {
  speedMult: 1,        // 1 = normal, 0.04 = slomo
  targetSpeed: 1,
  goldTint: 0,         // 0 = normal, 1 = full gold
  targetGold: 0,
  breathe: 0
};

function initBg() {
  bgCvs.width = window.innerWidth;
  bgCvs.height = window.innerHeight;
  const W = bgCvs.width, H = bgCvs.height;

  stars = Array.from({ length: 160 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.4 + 0.2,
    spd: Math.random() * 0.25 + 0.04,
    op: Math.random() * 0.65 + 0.15,
    twinkle: Math.random() * Math.PI * 2
  }));

  nebula = Array.from({ length: 6 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 140 + 60,
    hue: Math.random() < 0.5 ? '192,21,42' : '20,40,80',
    op: Math.random() * 0.06 + 0.02
  }));
}

function animateBg(t) {
  const W = bgCvs.width, H = bgCvs.height;

  // lerp bg state
  bgState.speedMult += (bgState.targetSpeed - bgState.speedMult) * 0.04;
  bgState.goldTint  += (bgState.targetGold  - bgState.goldTint)  * 0.03;
  bgState.breathe   += 0.008;

  bgCtx.clearRect(0, 0, W, H);

  // base bg — lerp from deep space to warm gold-black
  const r1 = Math.round(5  + bgState.goldTint * 18);
  const g1 = Math.round(5  + bgState.goldTint * 10);
  const b1 = Math.round(7  - bgState.goldTint * 4);
  bgCtx.fillStyle = `rgb(${r1},${g1},${b1})`;
  bgCtx.fillRect(0, 0, W, H);

  // nebula — gold shift on WIN
  nebula.forEach((n, i) => {
    const pulse = 1 + 0.12 * Math.sin(bgState.breathe + i);
    const hue = bgState.goldTint > 0.5
      ? `${Math.round(220 * (1-bgState.goldTint))},${Math.round(160 + bgState.goldTint*40)},${Math.round(bgState.goldTint * 50)}`
      : n.hue;
    const op = n.op * pulse * (1 + bgState.goldTint * 1.8);
    const grd = bgCtx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * pulse);
    grd.addColorStop(0, `rgba(${hue},${Math.min(op, 0.18)})`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    bgCtx.fillStyle = grd;
    bgCtx.beginPath();
    bgCtx.arc(n.x, n.y, n.r * pulse, 0, Math.PI * 2);
    bgCtx.fill();
  });

  // stars — slow on slomo, sparkle gold
  stars.forEach(s => {
    s.twinkle += 0.018 * (0.3 + bgState.speedMult * 0.7);
    const op = s.op * (0.75 + 0.25 * Math.sin(s.twinkle));
    const cr = Math.round(200 + bgState.goldTint * 55);
    const cg = Math.round(220 + bgState.goldTint * 15);
    const cb = Math.round(240 - bgState.goldTint * 120);
    bgCtx.beginPath();
    // WIN 별 — 크기 살짝 키움
    const pr = s.r * (1 + bgState.goldTint * 0.6);
    bgCtx.arc(s.x, s.y, pr, 0, Math.PI * 2);
    bgCtx.fillStyle = `rgba(${cr},${cg},${cb},${op})`;
    bgCtx.fill();
    s.y += s.spd * bgState.speedMult;
    if (s.y > H + 2) { s.y = -2; s.x = Math.random() * W; }
  });

  requestAnimationFrame(animateBg);
}

// GAME ENGINE

const cvs = document.getElementById('gameCanvas');
const ctx = cvs.getContext('2d');
let W, H;

// ── state ──────────────────────────────────────────────────────────────────
let G = {
  running: false,

  timeLeft: 60,
  score: 0,

// ── player ─────────────────────────────────────────────────────────────────
function resetPlayer() {
  G.player = {
    x: W / 2, y: H - 110,
    vx: 0,
    invTimer: 0,
    shieldAlpha: 0
  };
}

// ── enemy configs ──────────────────────────────────────────────────────────
const ENEMY_TYPES = {
  scout: { hp: 1, r: 12, spd: 0.9, score: 10, color: '#e05090', shootRate: 2.5, shootSpd: 200 },
  dart:  { hp: 1, r: 10, spd: 1.8, score: 20, color: '#40d0d0', shootRate: 0,   shootSpd: 0   },
  bulk:  { hp: 3, r: 16, spd: 0.55, score: 35, color: '#e0a020', shootRate: 1.8, shootSpd: 160 },
  sniper:{ hp: 1, r: 11, spd: 0.65, score: 25, color: '#9060e0', shootRate: 1.2, shootSpd: 340 }
};

function waveEnemyPool(wave) {
  if (wave <= 1) return ['scout','scout','scout','scout'];
  if (wave <= 3) return ['scout','scout','dart','dart','scout'];
  if (wave <= 5) return ['scout','bulk','dart','scout','dart'];
  if (wave <= 8) return ['bulk','scout','dart','scout','bulk','dart'];
  return ['bulk','sniper','dart','bulk','dart','scout','bulk'];
}

function spawnWave() {
  const pool = waveEnemyPool(G.wave);
  const cols = Math.min(pool.length, 6);
  const spacing = Math.min(W / (cols + 1), 65);
  const startX = (W - spacing * (cols - 1)) / 2;

  for (let i = 0; i < cols; i++) {
    const type = pool[Math.floor(Math.random() * pool.length)];
    const cfg = ENEMY_TYPES[type];
    const diff = G.stageDiff || 1;
    G.enemies.push({
      x: startX + i * spacing,
      y: -cfg.r - 10,
      vx: (Math.random() - 0.5) * 1.2,
      type, ...cfg,
      hp: cfg.hp,
      hpMax: cfg.hp,
      spd: cfg.spd * diff,
      shootRate: cfg.shootRate > 0 ? cfg.shootRate / Math.sqrt(diff) : 0,
      shootSpd: cfg.shootSpd * Math.sqrt(diff),
      score: cfg.score,
      color: cfg.color,
      shootCd: cfg.shootRate * (0.5 + Math.random()),
      angle: 0,
      wobble: Math.random() * Math.PI * 2
    });
  }
  G.waveSpawnCount++;
  G.wave = Math.floor(G.waveSpawnCount / 2) + 1;
  showWaveToast(`WAVE ${G.wave}`);
}

// ── spawn effects ───────────────────────────────────────────────────────────
function burst(x, y, color, n = 14, speedMul = 1) {
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 * i / n) + Math.random() * 0.4;
    const spd = (Math.random() * 2.8 + 0.8) * speedMul;
    G.particles.push({
      x, y,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
      life: 1, decay: Math.random() * 0.025 + 0.018,
      r: Math.random() * 3.5 + 1,
      color
    });
  }
}

function sparkLine(x, y, color) {
  for (let i = 0; i < 5; i++) {
    G.particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 5,
      vy: (Math.random() - 0.5) * 5,
      life: 0.7, decay: 0.04,
      r: 1.5, color
    });
  }
}

// ── powerup system ──────────────────────────────────────────────────────────
const POWERUP_TYPES = [
  { type: 'spread', color: '#e8c97a', label: 'SPREAD',  glyph: '⊕' },
  { type: 'rapid',  color: '#ff9944', label: 'RAPID',   glyph: '⊗' },
  { type: 'laser',  color: '#44ffcc', label: 'LASER',   glyph: '⊘' },
  { type: 'bomb',   color: '#ff5533', label: 'BOMB',    glyph: '⊛' },
];

const WEAPON_COLORS = {
  normal: '#a8d8f0',
  spread: '#e8c97a',
  rapid:  '#ff9944',
  laser:  '#44ffcc',
  bomb:   '#ff5533',
};

function tryDropPowerup(x, y) {
  if (Math.random() > 0.28) return; // 28% drop rate
  const cfg = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
  G.powerups.push({
    x, y,
    vy: 1.1,
    life: 5.5,
    pulse: Math.random() * Math.PI * 2,
    ...cfg
  });
}

function drawPowerups() {
  G.powerups.forEach(p => {
    p.pulse += 0.07;
    const sc = 0.85 + 0.15 * Math.sin(p.pulse);
    const fade = Math.min(1, p.life * 0.8);
    ctx.save();
    ctx.globalAlpha = fade;
    ctx.translate(p.x, p.y);
    ctx.scale(sc, sc);
    // outer ring
    glow(p.color, 20);
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, 14, 0, Math.PI * 2);
    ctx.stroke();
    // inner fill
    ctx.fillStyle = p.color + '22';
    ctx.beginPath();
    ctx.arc(0, 0, 12, 0, Math.PI * 2);
    ctx.fill();
    // label
    noGlow();
    ctx.fillStyle = p.color;
    ctx.font = `bold ${clamp(7, 2.5, 9)}px 'Space Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.label.slice(0,3), 0, 0);
    ctx.restore();
  });
}

function clamp(a, b, c) { return Math.min(c, Math.max(a, b * (W / 400))); }

// ── laser beam draw ─────────────────────────────────────────────────────────
function drawLaser() {
  if (!G.laserActive && G.laserAlpha <= 0) return;
  const x = G.player.x;
  const alpha = G.laserAlpha;
  ctx.save();
  // core beam
  ctx.globalAlpha = alpha * 0.9;
  glow('#44ffcc', 30);
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x, G.player.y - 22);
  ctx.lineTo(x, 0);
  ctx.stroke();
  // glow outer
  ctx.globalAlpha = alpha * 0.3;
  ctx.strokeStyle = '#44ffcc';
  ctx.lineWidth = 12;
  ctx.beginPath();
  ctx.moveTo(x, G.player.y - 22);
  ctx.lineTo(x, 0);
  ctx.stroke();
  noGlow();
  ctx.restore();
}

// ── drawing helpers ─────────────────────────────────────────────────────────
function glow(color, blur = 12) {
  ctx.shadowBlur = blur;
  ctx.shadowColor = color;
}
function noGlow() { ctx.shadowBlur = 0; }

function drawShip(p) {
  if (p.invTimer > 0 && Math.floor(p.invTimer * 14) % 2 === 0) return;
  ctx.save();
  ctx.translate(p.x, p.y);

  // engine trail glow
  const thrust = ctx.createRadialGradient(0, 14, 0, 0, 20, 22);
  thrust.addColorStop(0, 'rgba(120,200,255,0.3)');
  thrust.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = thrust;
  ctx.beginPath();
  ctx.arc(0, 18, 22, 0, Math.PI * 2);
  ctx.fill();

  // ship outline
  glow('rgba(168,216,240,0.9)', 16);
  ctx.strokeStyle = '#d0eeff';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(0, -20);
  ctx.lineTo(-13, 14);
  ctx.lineTo(-4, 8);
  ctx.lineTo(0, 11);
  ctx.lineTo(4, 8);
  ctx.lineTo(13, 14);
  ctx.closePath();
  ctx.stroke();

  // cockpit dot
  ctx.fillStyle = 'rgba(168,216,240,0.9)';
  ctx.beginPath();
  ctx.arc(0, -6, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // engine flame
  const fl = 5 + Math.random() * 9;
  glow('rgba(100,180,255,1)', 20);
  ctx.strokeStyle = 'rgba(150,210,255,0.85)';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-4, 12);
  ctx.quadraticCurveTo(0, 12 + fl * 1.2, 4, 12);
  ctx.stroke();

  // shield ring when invincible
  if (p.invTimer > 0) {
    const sa = Math.min(1, p.invTimer) * 0.35;
    ctx.strokeStyle = `rgba(168,216,240,${sa})`;
    ctx.lineWidth = 1.5;
    glow('rgba(168,216,240,0.5)', 8);
    ctx.beginPath();
    ctx.arc(0, 0, 26, 0, Math.PI * 2);
    ctx.stroke();
  }

  noGlow();
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  e.angle += 0.015;
  ctx.rotate(e.angle);

  glow(e.color, 18);
  ctx.strokeStyle = e.color;

  if (e.type === 'scout') {
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -e.r);
    ctx.lineTo(e.r * 0.87, e.r * 0.5);
    ctx.lineTo(-e.r * 0.87, e.r * 0.5);
    ctx.closePath();
    ctx.stroke();
    // inner dot
    ctx.fillStyle = e.color;
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.arc(0, 0, e.r * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  } else if (e.type === 'dart') {
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, -e.r);
    ctx.lineTo(e.r, 0);
    ctx.lineTo(0, e.r);
    ctx.lineTo(-e.r, 0);
    ctx.closePath();
    ctx.stroke();
  } else if (e.type === 'bulk') {
    ctx.lineWidth = 2.5;
    const sides = 6;
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const a = (Math.PI * 2 * i / sides);
      i === 0 ? ctx.moveTo(Math.cos(a)*e.r, Math.sin(a)*e.r)
              : ctx.lineTo(Math.cos(a)*e.r, Math.sin(a)*e.r);
    }
    ctx.closePath();
    ctx.stroke();
    // HP bar (unrotated)
    ctx.restore();
    ctx.save();
    ctx.translate(e.x, e.y);
    const bw = 22, bh = 3, bx = -bw/2, by = e.r + 5;
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = e.color;
    ctx.fillRect(bx, by, bw * (e.hp / e.hpMax), bh);
    ctx.restore();
    return;
  } else if (e.type === 'sniper') {
    ctx.lineWidth = 1.5;
    // cross + ring
    ctx.beginPath();
    ctx.moveTo(-e.r, 0); ctx.lineTo(e.r, 0);
    ctx.moveTo(0, -e.r); ctx.lineTo(0, e.r);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, 0, e.r * 0.65, 0, Math.PI * 2);
    ctx.stroke();
  }

  noGlow();
  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  glow(b.color, 12);
  ctx.fillStyle = b.color;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.fill();
  // tail
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.arc(b.x, b.y - b.vy * 0.008, b.r * 0.6, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  noGlow();
  ctx.restore();
}

function drawParticles() {
  G.particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    glow(p.color, 6);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

// ── physics helpers ─────────────────────────────────────────────────────────
function circ(ax, ay, ar, bx, by, br) {
  const dx = ax - bx, dy = ay - by;
  return dx * dx + dy * dy < (ar + br) * (ar + br);
}

// ── update ──────────────────────────────────────────────────────────────────
function update(dt) {
  const p = G.player;
  G.timeLeft -= dt;

  // player movement
  if (G.touchX !== null) {
    p.x += (G.touchX - p.x) * Math.min(dt * 9, 0.95);
  }
  p.x = Math.max(22, Math.min(W - 22, p.x));
  if (p.invTimer > 0) p.invTimer -= dt;

  // weapon timer
  if (G.weapon !== 'normal' && G.weapon !== 'bomb_hold') {
    G.weaponTimer -= dt;
    if (G.weaponTimer <= 0) setWeapon('normal');
  }

  // ── shooting ───────────────────────────────────────────────────────────
  G.shootTimer -= dt;
  const interval = G.weapon === 'rapid' ? 0.07 : 0.17;

  // 레이저: 타이머 무관, 매 프레임 연속 처리
  if (G.weapon === 'laser') {
    G.laserActive = true;
    G.laserAlpha = Math.min(1, G.laserAlpha + dt * 10);
    sndStartLaser();
    for (let ei = G.enemies.length - 1; ei >= 0; ei--) {
      const e = G.enemies[ei];
      if (Math.abs(e.x - p.x) < e.r + 6) {
        e.hp -= dt * 18;
        if (Math.random() < 0.3) burst(e.x, e.y + Math.random() * 10, '#44ffcc', 2, 0.4);
        if (e.hp <= 0) {
          G.score += e.score;
          burst(e.x, e.y, e.color, 16);
          sndExplosion(e.type);
          tryDropPowerup(e.x, e.y);
          G.enemies.splice(ei, 1);
          updateScore();
        }
      }
    }
  } else {
    G.laserActive = false;
    G.laserAlpha = Math.max(0, G.laserAlpha - dt * 8);
    sndStopLaser();
  }

  if (G.shootTimer <= 0) {
    G.shootTimer = interval;
    const bx = p.x, by = p.y - 22;
    const bc = WEAPON_COLORS[G.weapon] || '#a8d8f0';

    sndShoot(G.weapon);

    if (G.weapon === 'spread') {
      [-28, -14, 0, 14, 28].forEach(deg => {
        const rad = deg * Math.PI / 180;
        G.bullets.push({ x: bx, y: by,
          vx: Math.sin(rad) * 680, vy: -Math.cos(rad) * 680,
          r: 3, color: bc, spread: true });
      });
    } else if (G.weapon === 'rapid') {
      G.bullets.push({ x: bx - 8, y: by, vx: 0, vy: -780, r: 2.5, color: bc });
      G.bullets.push({ x: bx + 8, y: by, vx: 0, vy: -780, r: 2.5, color: bc });
    } else if (G.weapon !== 'laser') {
      // normal
      G.bullets.push({ x: bx, y: by, vx: 0, vy: -680, r: 3.5, color: bc });
      sparkLine(bx, by, bc);
    }
  }

  // spread bullet movement (has vx component)
  G.bullets.forEach(b => {
    b.y += b.vy * dt;
    if (b.vx) b.x += b.vx * dt;
  });
  G.bullets = G.bullets.filter(b => b.y > -10 && b.x > -10 && b.x < W + 10);

  // spawn
  G.spawnTimer -= dt;
  if (G.spawnTimer <= 0) {
    spawnWave();
    G.spawnTimer = Math.max(1.4, 3.2 - G.wave * 0.12);
  }

  G.enemyBullets = G.enemyBullets.filter(b => b.y < H + 10 && b.x > -10 && b.x < W + 10);
  G.enemyBullets.forEach(b => { b.y += b.vy * dt; if (b.homing) b.x += b.vx * dt; });

  // enemies
  G.enemies.forEach(e => {
    e.wobble += dt * 1.2;
    e.y += e.spd;
    e.x += e.vx + Math.sin(e.wobble) * 0.4;
    if (e.x < e.r + 10 || e.x > W - e.r - 10) e.vx *= -1;
    if (e.shootRate > 0) {
      e.shootCd -= dt;
      if (e.shootCd <= 0) {
        const ang = e.type === 'sniper'
          ? Math.atan2(G.player.y - e.y, G.player.x - e.x)
          : Math.PI / 2;
        G.enemyBullets.push({
          x: e.x, y: e.y + e.r,
          vx: Math.cos(ang) * e.shootSpd,
          vy: Math.sin(ang) * e.shootSpd,
          r: e.type === 'sniper' ? 2.5 : 3.5,
          color: e.color, homing: e.type === 'sniper'
        });
        e.shootCd = e.shootRate * (0.8 + Math.random() * 0.4);
      }
    }
  });

  // bullet ↔ enemy
  for (let bi = G.bullets.length - 1; bi >= 0; bi--) {
    const b = G.bullets[bi];
    let hit = false;
    for (let ei = G.enemies.length - 1; ei >= 0; ei--) {
      const e = G.enemies[ei];
      if (circ(b.x, b.y, b.r, e.x, e.y, e.r)) {
        if (!b.spread) { G.bullets.splice(bi, 1); hit = true; }
        e.hp--;
        burst(b.x, b.y, e.color, 5, 0.6);
        if (e.hp <= 0) {
          G.score += e.score;
          burst(e.x, e.y, e.color, 18);
          sndExplosion(e.type);
          tryDropPowerup(e.x, e.y);
          G.enemies.splice(ei, 1);
          updateScore();
        }
        if (hit) break;
      }
    }
  }

  // powerup update + collect
  for (let i = G.powerups.length - 1; i >= 0; i--) {
    const pu = G.powerups[i];
    pu.y += pu.vy;
    pu.life -= dt;
    if (pu.life <= 0 || pu.y > H + 20) { G.powerups.splice(i, 1); continue; }
    if (circ(pu.x, pu.y, 14, p.x, p.y, 26)) {
      collectPowerup(pu);
      G.powerups.splice(i, 1);
    }
  }

  // enemy bullet ↔ player
  if (p.invTimer <= 0) {
    for (let bi = G.enemyBullets.length - 1; bi >= 0; bi--) {
      const b = G.enemyBullets[bi];
      if (circ(b.x, b.y, b.r, p.x, p.y, 17)) {
        G.enemyBullets.splice(bi, 1);
        onHitPlayer(); break;
      }
    }
    for (let ei = G.enemies.length - 1; ei >= 0; ei--) {
      const e = G.enemies[ei];
      if (circ(e.x, e.y, e.r, p.x, p.y, 17)) {
        burst(e.x, e.y, e.color, 14);
        G.enemies.splice(ei, 1);
        onHitPlayer(); break;
      }
    }
  }

  G.enemies = G.enemies.filter(e => e.y < H + 50);

  G.particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.06; p.vx *= 0.97;
    p.life -= p.decay;
  });
  G.particles = G.particles.filter(p => p.life > 0);

  if (G.timeLeft <= 0 || G.lives <= 0) endGame();
}

function onHitPlayer() {
  G.lives--;
  G.player.invTimer = 2.2;
  burst(G.player.x, G.player.y, '#a8d8f0', 24, 1.3);
  sndHit();
  updateLives();
}

// ── weapon system ────────────────────────────────────────────────────────────
function setWeapon(type) {
  G.weapon = type;
  G.weaponTimer = (type === 'normal') ? 0 : 10;
  updateWeaponHUD();
  if (type !== 'laser') { G.laserActive = false; }
}

function collectPowerup(pu) {
  sndPowerup(pu.type);
  if (pu.type === 'bomb') {
    G.bombs = Math.min(G.bombs + 1, 3);
    showWaveToast('BOMB +1');
    updateBombHUD();
  } else {
    setWeapon(pu.type);
    showWaveToast(pu.label + ' GET!');
  }
  burst(pu.x, pu.y, pu.color, 20, 1.2);
}

function fireBomb() {
  if (G.bombs <= 0) return;
  G.bombs--;
  updateBombHUD();
  sndBomb();
  // 화면 전체 섬광
  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;inset:0;background:rgba(255,80,40,0.35);z-index:20;pointer-events:none;transition:opacity 0.5s';
  document.body.appendChild(flash);
  setTimeout(() => { flash.style.opacity = '0'; setTimeout(() => flash.remove(), 500); }, 50);
  // 모든 적 파괴
  G.enemies.forEach(e => {
    G.score += e.score;
    burst(e.x, e.y, e.color, 20, 1.4);
    burst(e.x, e.y, '#ff5533', 10, 1.8);
  });
  G.enemies = [];
  G.enemyBullets = [];
  updateScore();
  showWaveToast('BOMB!');
}

function updateWeaponHUD() {
  const hud = document.getElementById('weaponHud');
  const name = document.getElementById('weaponName');
  const bar = document.getElementById('weaponBar');
  if (G.weapon === 'normal') {
    hud.classList.remove('visible');
    return;
  }
  hud.classList.add('visible');
  const color = WEAPON_COLORS[G.weapon] || '#fff';
  name.textContent = G.weapon.toUpperCase();
  name.style.color = color;
  bar.style.background = color;
  bar.style.boxShadow = `0 0 8px ${color}`;
  bar.style.width = '100%';
}

function tickWeaponBar() {
  if (G.weapon === 'normal') return;
  const bar = document.getElementById('weaponBar');
  const ratio = Math.max(0, G.weaponTimer / 10);
  bar.style.width = (ratio * 100) + '%';
  if (ratio < 0.25) bar.style.opacity = '0.5';
  else bar.style.opacity = '1';
}

function updateBombHUD() {
  const hint = document.getElementById('bombHint');
  const cnt = document.getElementById('bombCount');
  if (G.bombs > 0) {
    hint.classList.add('visible');
    cnt.textContent = G.bombs;
  } else {
    hint.classList.remove('visible');
  }
}

// ── render ──────────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);
  drawLaser();
  drawParticles();
  drawPowerups();
  G.bullets.forEach(drawBullet);
  G.enemyBullets.forEach(drawBullet);
  G.enemies.forEach(drawEnemy);
  drawShip(G.player);
}

// ── loop ────────────────────────────────────────────────────────────────────
function loop(ts) {
  if (!G.running) return;
  const dt = Math.min((ts - G.lastTs) / 1000, 0.05);
  G.lastTs = ts;
  update(dt);
  render();
  updateHUD();
  tickWeaponBar();
  G.raf = requestAnimationFrame(loop);
}

// ── HUD updates ─────────────────────────────────────────────────────────────
function updateScore() {
  document.getElementById('scoreVal').textContent = G.score;
}

function updateLives() {
  const el = document.getElementById('livesEl');
  el.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'life-pip' + (i >= G.lives ? ' dead' : '');
    el.appendChild(d);
  }
}

function updateHUD() {
  const t = Math.max(0, G.timeLeft);
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60).toString().padStart(2, '0');
  const el = document.getElementById('timeVal');
  el.textContent = `${m}:${s}`;
  el.className = 'hud-time-val' + (t < 10 ? ' danger' : '');
}

// ── wave toast ───────────────────────────────────────────────────────────────
let waveToastTimer = null;
function showWaveToast(msg) {
  const el = document.getElementById('waveToast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(waveToastTimer);
  waveToastTimer = setTimeout(() => el.classList.remove('show'), 1200);
}

// ── screen management ────────────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('visible'));
  if (id) document.getElementById(id).classList.add('visible');
}

function startGame(secs, stageLevel = 1, carryScore = 0) {
  W = cvs.width = window.innerWidth;
  H = cvs.height = window.innerHeight;

  // difficulty scales with stage
  const diff = 1 + (stageLevel - 1) * 0.22;

  Object.assign(G, {
    running: false,
    timeTotal: secs, timeLeft: secs,
    score: carryScore, lives: 3,
    wave: Math.max(1, (stageLevel - 1) * 2 + 1),
    waveSpawnCount: Math.max(0, (stageLevel - 1) * 4),
    spawnTimer: Math.max(0.8, 1.4 - (stageLevel - 1) * 0.08),
    shootTimer: 0,
    stageLevel, stageDiff: diff,
    timeSelected: secs,
    weapon: 'normal', weaponTimer: 0,
    bombs: 0, laserActive: false, laserAlpha: 0,
    lastTapTime: 0,
    bullets: [], enemyBullets: [], enemies: [], particles: [], powerups: [],
    touchX: null
  });

  document.getElementById('weaponHud').classList.remove('visible');
  document.getElementById('bombHint').classList.remove('visible');
  document.getElementById('winScreen').classList.remove('visible');
  bgState.targetSpeed = 1;
  bgState.targetGold  = 0;
  stopFireworks();

  document.getElementById('stageVal').textContent = `STAGE ${stageLevel}`;
  resetPlayer();
  updateScore();
  updateLives();
  show(null);
  document.getElementById('hud').classList.add('visible');

  G.running = true;
  G.lastTs = performance.now();
  bgmSetMode('active');
  G.raf = requestAnimationFrame(loop);
}

function endGame() {
  G.running = false;
  sndStopLaser();
  bgmSetMode('ambient');
  cancelAnimationFrame(G.raf);
  document.getElementById('hud').classList.remove('visible');

  const cleared = G.lives > 0; // time ran out with lives remaining = stage clear
  const stageLabel = `STAGE ${G.stageLevel}`;
  const btnRow = document.getElementById('resultBtnRow');

  document.getElementById('finalStage').textContent = stageLabel;
  document.getElementById('finalStage').className = 'result-stage';
  document.getElementById('finalScore').textContent = G.score;
  document.getElementById('finalScore').className = 'result-score';
  document.getElementById('resultLabel').className = 'result-label';

  if (cleared && G.stageLevel >= 3) {
    // 슬로모 WIN 연출
    triggerWin(G.score);
    return; // gameoverScreen 표시 안 함
  } else if (cleared) {
    document.getElementById('resultLabel').textContent = `STAGE ${G.stageLevel} CLEAR`;
    document.getElementById('finalMsg').textContent = `시간 종료 · 잔여 라이프 ${G.lives}`;
    btnRow.innerHTML = `
      <button class="action-btn" onclick="showStart()">처음으로</button>
      <button class="action-btn" onclick="restartStage()">다시하기</button>
      <button class="action-btn primary" onclick="nextStage()">다음단계 ›</button>
    `;
  } else {
    document.getElementById('resultLabel').textContent = 'DESTROYED';
    document.getElementById('finalMsg').textContent = `스테이지 ${G.stageLevel} · 함선 파괴`;
    btnRow.innerHTML = `
      <button class="action-btn" onclick="showStart()">처음으로</button>
      <button class="action-btn primary" onclick="restartStage()">다시하기</button>
    `;
  }

  show('gameoverScreen');
}

function restartFromWin() {
  bgState.targetSpeed = 1;
  bgState.targetGold  = 0;
  stopFireworks();
  document.getElementById('winScreen').classList.remove('visible');
  startGame(G.timeSelected, 1, 0);
}

function showStartFromWin() {
  bgState.targetSpeed = 1;
  bgState.targetGold  = 0;
  stopFireworks();
  document.getElementById('winScreen').classList.remove('visible');
  show('startScreen');
}

// ── WIN CELEBRATION ─────────────────────────────────────────────────────────
let fwCanvas, fwCtx, fwRaf, fwParticles = [], fwTimer = 0;

function triggerWin(score) {
  // 배경 슬로모 + 골드
  bgState.targetSpeed = 0.04;
  bgState.targetGold  = 1;

  // WIN 화면 표시
  document.getElementById('winScore').textContent = score;
  document.getElementById('winScreen').classList.add('visible');

  // 불꽃놀이 캔버스 초기화
  fwCanvas = document.getElementById('winCanvas');
  fwCanvas.width  = window.innerWidth;
  fwCanvas.height = window.innerHeight;
  fwCtx = fwCanvas.getContext('2d');
  fwParticles = [];
  fwTimer = 0;

  fwLoop(performance.now());
}

function stopFireworks() {
  cancelAnimationFrame(fwRaf);
  if (fwCtx) fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
}

const FW_COLORS = [
  '#e8c97a','#ffd966','#ffb347',  // gold family
  '#a8d8f0','#60c8f8',            // ice
  '#c0152a','#ff4466',            // crimson
  '#ffffff','#f0eeea',            // white
  '#cc88ff','#44ffcc'             // accent
];

function fwBurst(x, y) {
  const color = FW_COLORS[Math.floor(Math.random() * FW_COLORS.length)];
  const n = 28 + Math.floor(Math.random() * 20);
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 * i / n) + (Math.random() - 0.5) * 0.3;
    const spd = Math.random() * 5 + 2;
    fwParticles.push({
      x, y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd,
      life: 1,
      decay: Math.random() * 0.012 + 0.008,
      r: Math.random() * 3 + 1.5,
      color,
      tail: []
    });
  }
  // center flash
  fwParticles.push({
    x, y, vx: 0, vy: 0,
    life: 1, decay: 0.06,
    r: 18, color: '#ffffff', flash: true
  });
}

let fwLastTs = 0;
function fwLoop(ts) {
  const dt = Math.min((ts - fwLastTs) / 1000, 0.05);
  fwLastTs = ts;
  fwTimer += dt;

  const W = fwCanvas.width, H = fwCanvas.height;
  fwCtx.clearRect(0, 0, W, H);

  // auto-launch bursts
  if (fwTimer > 0.55) {
    fwTimer = 0;
    const bx = W * (0.15 + Math.random() * 0.7);
    const by = H * (0.1  + Math.random() * 0.45);
    fwBurst(bx, by);
    // occasionally double
    if (Math.random() < 0.4) {
      fwBurst(W * (0.15 + Math.random() * 0.7), H * (0.1 + Math.random() * 0.45));
    }
  }

  // draw + update
  for (let i = fwParticles.length - 1; i >= 0; i--) {
    const p = fwParticles[i];
    fwCtx.save();
    if (p.flash) {
      fwCtx.globalAlpha = p.life * 0.6;
      const grd = fwCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * (2 - p.life));
      grd.addColorStop(0, 'rgba(255,255,255,0.9)');
      grd.addColorStop(1, 'rgba(255,255,255,0)');
      fwCtx.fillStyle = grd;
      fwCtx.beginPath();
      fwCtx.arc(p.x, p.y, p.r * (2 - p.life) * 2, 0, Math.PI * 2);
      fwCtx.fill();
    } else {
      fwCtx.globalAlpha = p.life;
      fwCtx.shadowBlur = 10;
      fwCtx.shadowColor = p.color;
      fwCtx.fillStyle = p.color;
      fwCtx.beginPath();
      fwCtx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      fwCtx.fill();
    }
    fwCtx.restore();

    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.055;
    p.vx *= 0.98;
    p.life -= p.decay;
    if (p.life <= 0) fwParticles.splice(i, 1);
  }

  fwRaf = requestAnimationFrame(fwLoop);
}

function restartStage() {
  startGame(G.timeSelected, G.stageLevel, 0);
}

function nextStage() {
  startGame(G.timeSelected, G.stageLevel + 1, G.score);
}

function showStart() {
  bgState.targetSpeed = 1;
  bgState.targetGold  = 0;
  stopFireworks();
  document.getElementById('winScreen').classList.remove('visible');
  show('startScreen');
}

// ── touch controls ───────────────────────────────────────────────────────────
function onTouchStart(e) {
  e.preventDefault();
  _initAudio();
  G.touchX = e.touches[0].clientX;
  G.touchActive = true;
  // double-tap → bomb
  const now = performance.now();
  if (G.running && now - G.lastTapTime < 300) {
    fireBomb();
  }
  G.lastTapTime = now;
}
function onTouchMove(e) {
  e.preventDefault();
  if (e.touches.length > 0) G.touchX = e.touches[0].clientX;
}
function onTouchEnd(e) {
  e.preventDefault();
  if (e.touches.length === 0) { G.touchX = null; G.touchActive = false; }
  else G.touchX = e.touches[0].clientX;
}

cvs.addEventListener('touchstart', onTouchStart, { passive: false });
cvs.addEventListener('touchmove', onTouchMove, { passive: false });
cvs.addEventListener('touchend', onTouchEnd, { passive: false });

// mouse fallback
cvs.addEventListener('mousemove', e => { _initAudio(); if (G.running) G.touchX = e.clientX; });
cvs.addEventListener('mouseleave', () => { G.touchX = null; });

// ── resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  bgCvs.width = window.innerWidth;
  bgCvs.height = window.innerHeight;
  if (G.running) {
    W = cvs.width = window.innerWidth;
    H = cvs.height = window.innerHeight;
  } else {
    cvs.width = window.innerWidth;
    cvs.height = window.innerHeight;
  }
  initBg();
});

// ── boot ─────────────────────────────────────────────────────────────────────
initBg();
requestAnimationFrame(animateBg);
</script>
