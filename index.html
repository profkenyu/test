<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Total Solar Eclipse — Generative Art</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial, Helvetica, sans-serif;
}

canvas{
    display:block;
    width:100%;
    height:100%;
}

#overlay{
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    pointer-events:none;
    background:
        radial-gradient(circle at center,
            rgba(255,255,255,0.02) 0%,
            rgba(0,0,0,0.0) 40%,
            rgba(0,0,0,0.55) 100%);
}

#title{
    position:fixed;
    top:24px;
    left:32px;
    color:rgba(255,255,255,0.78);
    letter-spacing:0.25em;
    font-size:13px;
    font-weight:300;
    text-transform:uppercase;
    mix-blend-mode:screen;
    user-select:none;
}

#subtitle{
    position:fixed;
    bottom:24px;
    left:32px;
    color:rgba(255,255,255,0.4);
    font-size:12px;
    letter-spacing:0.12em;
    line-height:1.7;
    user-select:none;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="overlay"></div>

<div id="title">
TOTAL SOLAR ECLIPSE / GENERATIVE VISUALIZATION
</div>

<div id="subtitle">
Mathematical Visualization → Emotional Experience → Generative Art System
</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let w, h, cx, cy;
let t = 0;

function resize(){
    w = canvas.width = window.innerWidth * devicePixelRatio;
    h = canvas.height = window.innerHeight * devicePixelRatio;

    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";

    cx = w * 0.5;
    cy = h * 0.5;
}

window.addEventListener("resize", resize);
resize();


// ---------- Mathematical System ----------

// Smooth orbital phase
function phase(time){
    return (Math.sin(time * 0.12) + 1.0) * 0.5;
}

// Easing
function ease(x){
    return x * x * (3.0 - 2.0 * x);
}

// Corona intensity equation
function coronaIntensity(overlap){
    return Math.pow(overlap, 4.0);
}

// Golden glow
function glowCurve(r, radius){
    return Math.exp(-r * r / (radius * radius));
}


// ---------- Main Render ----------

function render(){

    t += 0.01;

    ctx.clearRect(0,0,w,h);

    // Background deep black
    ctx.fillStyle = "rgb(0,0,0)";
    ctx.fillRect(0,0,w,h);

    // Time parameter
    const p = ease(phase(t));

    // Huge moon
    const moonR = Math.min(w,h) * 0.24;

    // Sun larger behind moon
    const sunR = moonR * 1.06;

    // Moon movement
    const offset =
        (1.0 - p) * (moonR * 2.2) -
        moonR * 1.1;

    const moonX = cx + offset;
    const sunX = cx;

    // Overlap metric
    const dx = Math.abs(moonX - sunX);
    const overlap = Math.max(
        0,
        1.0 - dx / (moonR * 1.8)
    );

    // Corona strength
    const corona = coronaIntensity(overlap);

    // ---------- Volumetric Corona ----------

    for(let i=0;i<220;i++){

        const a =
            (Math.PI * 2 / 220) * i +
            Math.sin(i * 12.0 + t) * 0.04;

        const noise =
            0.5 + 0.5 *
            Math.sin(i * 3.0 + t * 1.2);

        const length =
            moonR * (
                1.3 +
                corona * 1.9 * noise
            );

        const x1 = sunX + Math.cos(a) * moonR * 0.92;
        const y1 = cy   + Math.sin(a) * moonR * 0.92;

        const x2 = sunX + Math.cos(a) * length;
        const y2 = cy   + Math.sin(a) * length;

        const grad = ctx.createLinearGradient(x1,y1,x2,y2);

        grad.addColorStop(
            0,
            `rgba(255,245,210,${0.22 + corona * 0.6})`
        );

        grad.addColorStop(
            0.4,
            `rgba(255,220,140,${0.08 + corona * 0.24})`
        );

        grad.addColorStop(
            1,
            `rgba(255,180,90,0)`
        );

        ctx.strokeStyle = grad;

        ctx.lineWidth =
            (1.0 + noise * 3.5) * devicePixelRatio;

        ctx.beginPath();
        ctx.moveTo(x1,y1);
        ctx.lineTo(x2,y2);
        ctx.stroke();
    }


    // ---------- Solar Glow ----------

    for(let i=0;i<8;i++){

        const rr =
            moonR * (1.25 + i * 0.18);

        const alpha =
            (0.09 - i * 0.009) *
            (0.2 + corona);

        const g =
            ctx.createRadialGradient(
                sunX, cy, moonR * 0.7,
                sunX, cy, rr
            );

        g.addColorStop(
            0,
            `rgba(255,220,150,${alpha})`
        );

        g.addColorStop(
            0.5,
            `rgba(255,180,80,${alpha*0.6})`
        );

        g.addColorStop(
            1,
            `rgba(0,0,0,0)`
        );

        ctx.fillStyle = g;

        ctx.beginPath();
        ctx.arc(sunX,cy,rr,0,Math.PI*2);
        ctx.fill();
    }


    // ---------- Sun Disc ----------

    const sunGrad =
        ctx.createRadialGradient(
            sunX,cy,0,
            sunX,cy,sunR
        );

    sunGrad.addColorStop(0,"rgba(255,250,230,1)");
    sunGrad.addColorStop(0.45,"rgba(255,220,120,1)");
    sunGrad.addColorStop(0.75,"rgba(255,170,40,1)");
    sunGrad.addColorStop(1,"rgba(255,120,10,0.9)");

    ctx.fillStyle = sunGrad;

    ctx.beginPath();
    ctx.arc(sunX,cy,sunR,0,Math.PI*2);
    ctx.fill();


    // ---------- Diamond Ring ----------

    const ring =
        Math.exp(
            -Math.pow((p - 0.93) * 18.0,2.0)
        );

    if(ring > 0.01){

        const rx = moonX + moonR * 0.96;
        const ry = cy - moonR * 0.12;

        const rg =
            ctx.createRadialGradient(
                rx,ry,0,
                rx,ry,moonR*0.45
            );

        rg.addColorStop(
            0,
            `rgba(255,255,255,${ring})`
        );

        rg.addColorStop(
            0.2,
            `rgba(255,230,180,${ring*0.9})`
        );

        rg.addColorStop(
            1,
            `rgba(255,180,80,0)`
        );

        ctx.fillStyle = rg;

        ctx.beginPath();
        ctx.arc(rx,ry,moonR*0.45,0,Math.PI*2);
        ctx.fill();
    }


    // ---------- Moon ----------

    const moonGrad =
        ctx.createRadialGradient(
            moonX - moonR*0.35,
            cy - moonR*0.4,
            moonR*0.2,
            moonX,
            cy,
            moonR
        );

    moonGrad.addColorStop(0,"rgb(32,32,35)");
    moonGrad.addColorStop(0.6,"rgb(10,10,12)");
    moonGrad.addColorStop(1,"rgb(0,0,0)");

    ctx.fillStyle = moonGrad;

    ctx.beginPath();
    ctx.arc(moonX,cy,moonR,0,Math.PI*2);
    ctx.fill();


    // ---------- Thin Rim Lighting ----------

    const rim =
        ctx.createRadialGradient(
            moonX,cy,moonR*0.92,
            moonX,cy,moonR*1.03
        );

    rim.addColorStop(0,"rgba(255,255,255,0)");
    rim.addColorStop(0.5,"rgba(255,255,255,0.05)");
    rim.addColorStop(1,"rgba(255,255,255,0)");

    ctx.fillStyle = rim;

    ctx.beginPath();
    ctx.arc(moonX,cy,moonR*1.03,0,Math.PI*2);
    ctx.fill();


    // ---------- Light Emergence ----------

    const emerge =
        Math.max(0,p - 0.52);

    if(emerge > 0){

        for(let i=0;i<12;i++){

            const rr =
                moonR * (1.8 + i*0.28);

            const a =
                (0.02 + emerge*0.05) *
                (1 - i/12);

            const g =
                ctx.createRadialGradient(
                    sunX,cy,moonR,
                    sunX,cy,rr
                );

            g.addColorStop(
                0,
                `rgba(255,210,120,${a})`
            );

            g.addColorStop(
                1,
                `rgba(0,0,0,0)`
            );

            ctx.fillStyle = g;

            ctx.beginPath();
            ctx.arc(sunX,cy,rr,0,Math.PI*2);
            ctx.fill();
        }
    }


    // ---------- Subtle Camera Drift ----------

    ctx.setTransform(
        1,
        Math.sin(t*0.08)*0.002,
        Math.sin(t*0.05)*0.002,
        1,
        0,
        0
    );

    requestAnimationFrame(render);
}

render();

</script>

</body>
</html>
